<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMer Daily Tracker</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Babel 用于解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Trophy, Flame, Code2, CalendarDays, Plus, CheckCircle2, 
      Swords, TrendingUp, Activity, Search, ChevronDown, ChevronUp, Tag 
    } from 'https://esm.sh/lucide-react@0.263.1';

    const App = () => {
      const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      // 从 LocalStorage 读取数据，实现数据持久化落地
      const [problems, setProblems] = useState(() => {
        const savedData = localStorage.getItem('acmer_tracker_data');
        if (savedData) {
          return JSON.parse(savedData);
        }
        // 如果没有历史记录，提供一些初始的 Demo 数据
        return [
          { id: 1, title: 'A. Watermelon', platform: 'Codeforces', date: getTodayStr(), difficulty: 'Easy', description: '判断一个西瓜能否分成两个偶数重量的部分。', thoughts: '判断 n > 2 且 n % 2 == 0 即可。', tags: ['math', 'brute force'] },
          { id: 2, title: 'B. Before an Exam', platform: 'Codeforces', date: getTodayStr(), difficulty: 'Medium', description: '给定期望总时间以及每天的最小最大学习时间，求分配方案。', thoughts: '贪心，先全部分配最小值，剩余的时间再从头尽量分配到最大值。', tags: ['greedy'] }
        ];
      });

      // 每次 problems 数据变化时，自动保存到浏览器的 LocalStorage
      useEffect(() => {
        localStorage.setItem('acmer_tracker_data', JSON.stringify(problems));
      }, [problems]);

      const [newTitle, setNewTitle] = useState('');
      const [newPlatform, setNewPlatform] = useState('Codeforces');
      const [newDifficulty, setNewDifficulty] = useState('Medium');
      const [newDescription, setNewDescription] = useState('');
      const [newThoughts, setNewThoughts] = useState('');
      const [newTags, setNewTags] = useState('');

      const [searchQuery, setSearchQuery] = useState('');
      const [expandedId, setExpandedId] = useState(null);

      const handleAddProblem = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;

        const newProblem = {
          id: Date.now(),
          title: newTitle,
          platform: newPlatform,
          date: getTodayStr(), // 自动记录为当天
          difficulty: newDifficulty,
          description: newDescription,
          thoughts: newThoughts,
          tags: newTags.split(',').map(t => t.trim()).filter(t => t !== '')
        };

        setProblems([newProblem, ...problems]);
        setNewTitle('');
        setNewDescription('');
        setNewThoughts('');
        setNewTags('');
      };

      const todayCount = problems.filter(p => p.date === getTodayStr()).length;

      const getStatusEffect = (count) => {
        if (count === 0) return { label: 'Newbie (热身中)', color: 'text-slate-500', bg: 'bg-slate-100', border: 'border-slate-200', glow: '' };
        if (count <= 2) return { label: 'Pupil (渐入佳境)', color: 'text-green-600', bg: 'bg-green-50', border: 'border-green-200', glow: 'shadow-[0_0_15px_rgba(34,197,94,0.2)]' };
        if (count <= 4) return { label: 'Specialist (稳定输出)', color: 'text-cyan-600', bg: 'bg-cyan-50', border: 'border-cyan-200', glow: 'shadow-[0_0_20px_rgba(6,182,212,0.3)]' };
        if (count <= 6) return { label: 'Master (超神状态)', color: 'text-orange-500', bg: 'bg-orange-50', border: 'border-orange-200', glow: 'shadow-[0_0_25px_rgba(249,115,22,0.4)]' };
        return { label: 'Grandmaster (AC 机器!)', color: 'text-red-600', bg: 'bg-red-50', border: 'border-red-300', glow: 'shadow-[0_0_30px_rgba(239,68,68,0.5)] animate-pulse' };
      };

      const currentStatus = getStatusEffect(todayCount);

      const heatmapData = useMemo(() => {
        const days = [];
        const countsByDate = {};
        
        problems.forEach(p => {
          countsByDate[p.date] = (countsByDate[p.date] || 0) + 1;
        });

        for (let i = 59; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          days.push({
            date: dateStr,
            count: countsByDate[dateStr] || 0
          });
        }
        return days;
      }, [problems]);

      const getHeatmapColor = (count) => {
        if (count === 0) return 'bg-slate-100';
        if (count <= 2) return 'bg-green-200';
        if (count <= 4) return 'bg-green-400';
        if (count <= 6) return 'bg-green-600';
        return 'bg-green-800'; 
      };

      const filteredProblems = problems.filter(p => {
        const query = searchQuery.toLowerCase();
        const tagMatch = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
        return p.title.toLowerCase().includes(query) || p.platform.toLowerCase().includes(query) || tagMatch;
      });

      return (
        <div className="min-h-screen bg-slate-900 text-slate-200 p-4 md:p-8 font-sans relative overflow-x-hidden">
          <style>
            {`
              @keyframes grandmaster-bg {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
              }
              .effect-grandmaster {
                background: linear-gradient(-45deg, #7f1d1d, #4c1d95, #9a3412, #831843);
                background-size: 400% 400%;
                animation: grandmaster-bg 5s ease infinite;
              }
            `}
          </style>
          {todayCount >= 5 && (
            <div className="fixed inset-0 pointer-events-none z-0 effect-grandmaster opacity-40 mix-blend-color-dodge"></div>
          )}

          <div className="max-w-6xl mx-auto space-y-8 relative z-10">
            <header className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="p-3 bg-indigo-600 rounded-xl">
                  <Code2 className="text-white w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-2xl font-bold text-white tracking-wider">ACMer Daily</h1>
                  <p className="text-slate-400 text-sm">Keep coding, keep passing.</p>
                </div>
              </div>
              <div className="text-right hidden md:block">
                <p className="text-sm text-slate-400">Total Accepted</p>
                <p className="text-3xl font-black text-white">{problems.length}</p>
              </div>
            </header>

            <section className={`rounded-2xl p-6 transition-all duration-500 border ${currentStatus.bg} ${currentStatus.border} ${currentStatus.glow}`}>
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-6">
                  <div className={`p-4 rounded-full bg-white/50 backdrop-blur-sm ${currentStatus.color}`}>
                    {todayCount >= 5 ? <Flame size={40} className="animate-bounce" /> : <Trophy size={40} />}
                  </div>
                  <div>
                    <p className="text-sm font-semibold text-slate-600 mb-1">今日状态</p>
                    <h2 className={`text-3xl md:text-4xl font-black ${currentStatus.color}`}>
                      {currentStatus.label}
                    </h2>
                    <p className="text-slate-600 mt-2 font-medium">
                      今天已经 AC 了 <span className="text-xl font-bold mx-1">{todayCount}</span> 道题
                    </p>
                  </div>
                </div>
                
                <div className="w-full md:w-64 bg-white/40 rounded-full h-4 overflow-hidden border border-white/50">
                  <div 
                    className={`h-full transition-all duration-1000 ${todayCount >= 5 ? 'bg-red-500' : 'bg-indigo-500'}`}
                    style={{ width: `${Math.min((todayCount / 7) * 100, 100)}%` }}
                  />
                </div>
              </div>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <div className="lg:col-span-2 space-y-8">
                <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl">
                  <div className="flex items-center justify-between mb-6">
                    <h3 className="text-lg font-bold flex items-center gap-2 text-white">
                      <Activity size={20} className="text-indigo-400"/> 
                      刷题活跃度 (近 60 天)
                    </h3>
                    <div className="flex items-center gap-2 text-xs text-slate-400">
                      <span>Less</span>
                      <div className="flex gap-1">
                        {[0, 1, 3, 5, 7].map(c => (
                          <div key={c} className={`w-3 h-3 rounded-sm ${getHeatmapColor(c)}`} />
                        ))}
                      </div>
                      <span>More</span>
                    </div>
                  </div>
                  
                  <div className="grid grid-flow-col grid-rows-7 gap-1.5 overflow-x-auto pb-2">
                    {heatmapData.map((day, i) => (
                      <div 
                        key={i}
                        title={`${day.date}: ${day.count} AC`}
                        className={`w-4 h-4 md:w-5 md:h-5 rounded-sm transition-colors duration-300 hover:ring-2 hover:ring-white ${getHeatmapColor(day.count)}`}
                      />
                    ))}
                  </div>
                </div>

                <div className="bg-slate-800 rounded-2xl border border-slate-700 shadow-xl overflow-hidden">
                  <div className="p-4 border-b border-slate-700 bg-slate-800/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <h3 className="font-bold text-white flex items-center gap-2 shrink-0">
                      <CheckCircle2 size={18} className="text-green-400" />
                      AC 记录薄
                    </h3>
                    <div className="relative w-full sm:w-64 shrink-0">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4" />
                      <input 
                        type="text" 
                        placeholder="搜索题名、平台或标签..." 
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full pl-9 pr-4 py-2 bg-slate-900 border border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none text-slate-200 placeholder:text-slate-500"
                      />
                    </div>
                  </div>
                  <div className="divide-y divide-slate-700/50 max-h-[600px] overflow-y-auto">
                    {filteredProblems.map(problem => (
                      <div key={problem.id} className="flex flex-col hover:bg-slate-700/30 transition-colors">
                        <div 
                          className="p-4 flex items-center justify-between cursor-pointer"
                          onClick={() => setExpandedId(expandedId === problem.id ? null : problem.id)}
                        >
                          <div className="flex items-center gap-4">
                            <div className="text-slate-400 text-sm font-mono bg-slate-900 px-2 py-1 rounded hidden sm:block">
                              {problem.platform}
                            </div>
                            <div className="flex flex-col">
                              <span className="font-medium text-slate-200">{problem.title}</span>
                              <div className="flex gap-2 mt-1 sm:hidden">
                                <span className="text-slate-500 text-xs font-mono">{problem.platform}</span>
                              </div>
                            </div>
                          </div>
                          <div className="flex items-center gap-3 md:gap-4 shrink-0">
                            <span className={`text-xs px-2 py-1 rounded-full font-bold hidden sm:inline-block ${
                              problem.difficulty === 'Hard' ? 'bg-red-500/20 text-red-400' :
                              problem.difficulty === 'Medium' ? 'bg-orange-500/20 text-orange-400' :
                              'bg-green-500/20 text-green-400'
                            }`}>
                              {problem.difficulty}
                            </span>
                            <span className="text-slate-500 text-xs hidden md:block">{problem.date}</span>
                            {expandedId === problem.id ? <ChevronUp size={18} className="text-slate-400"/> : <ChevronDown size={18} className="text-slate-400"/>}
                          </div>
                        </div>
                        
                        {expandedId === problem.id && (
                          <div className="px-4 pb-4 pt-1 border-t border-slate-700/30 bg-slate-800/20">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                              <div className="space-y-1">
                                <p className="text-xs text-indigo-300 font-semibold uppercase tracking-wider">题意 (Description)</p>
                                <p className="text-sm text-slate-300 bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 min-h-[3rem]">
                                  {problem.description || <span className="text-slate-600 italic">未记录题意...</span>}
                                </p>
                              </div>
                              <div className="space-y-1">
                                <p className="text-xs text-indigo-300 font-semibold uppercase tracking-wider">思路 (Thoughts)</p>
                                <p className="text-sm text-slate-300 bg-slate-900/50 p-3 rounded-lg border border-slate-700/50 min-h-[3rem]">
                                  {problem.thoughts || <span className="text-slate-600 italic">未记录思路...</span>}
                                </p>
                              </div>
                            </div>
                            
                            <div className="mt-4 flex flex-wrap items-center gap-2">
                              <Tag size={14} className="text-slate-500" />
                              {problem.tags && problem.tags.length > 0 ? (
                                problem.tags.map((tag, idx) => (
                                  <span key={idx} className="text-xs px-2 py-1 bg-slate-700 text-slate-300 rounded-md">
                                    #{tag}
                                  </span>
                                ))
                              ) : (
                                <span className="text-xs text-slate-500 italic">无标签</span>
                              )}
                              <span className={`sm:hidden text-xs px-2 py-1 rounded-full font-bold ml-auto ${
                                problem.difficulty === 'Hard' ? 'bg-red-500/20 text-red-400' :
                                problem.difficulty === 'Medium' ? 'bg-orange-500/20 text-orange-400' :
                                'bg-green-500/20 text-green-400'
                              }`}>
                                {problem.difficulty}
                              </span>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                    {filteredProblems.length === 0 && (
                      <div className="p-8 text-center text-slate-500">
                        没有找到匹配的记录...
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="space-y-8">
                <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 shadow-xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-8 opacity-5">
                    <Swords size={120} />
                  </div>
                  
                  <h3 className="text-lg font-bold text-white mb-6 relative z-10 flex items-center gap-2">
                    <Plus size={20} className="text-indigo-400" />
                    记录新的 AC
                  </h3>
                  
                  <form onSubmit={handleAddProblem} className="space-y-5 relative z-10">
                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">题目来源 Platform</label>
                      <select 
                        value={newPlatform}
                        onChange={(e) => setNewPlatform(e.target.value)}
                        className="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                      >
                        <option>Codeforces</option>
                        <option>AtCoder</option>
                        <option>LeetCode</option>
                        <option>Luogu</option>
                        <option>NowCoder</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">题目名称 Title</label>
                      <input 
                        type="text"
                        value={newTitle}
                        onChange={(e) => setNewTitle(e.target.value)}
                        placeholder="输入题号或名称..."
                        className="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">简述题意 Description</label>
                      <textarea 
                        value={newDescription}
                        onChange={(e) => setNewDescription(e.target.value)}
                        placeholder="这道题让你求什么..."
                        rows="2"
                        className="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600 resize-none"
                      ></textarea>
                    </div>

                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">核心思路 Thoughts</label>
                      <textarea 
                        value={newThoughts}
                        onChange={(e) => setNewThoughts(e.target.value)}
                        placeholder="怎么想到的，用了什么算法..."
                        rows="3"
                        className="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600 resize-none"
                      ></textarea>
                    </div>

                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">标签 Tags (逗号分隔)</label>
                      <input 
                        type="text"
                        value={newTags}
                        onChange={(e) => setNewTags(e.target.value)}
                        placeholder="例如: dp, math, greedy"
                        className="w-full bg-slate-900 border border-slate-600 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-600"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">难度预估 Difficulty</label>
                      <div className="grid grid-cols-3 gap-2">
                        {['Easy', 'Medium', 'Hard'].map(diff => (
                          <button
                            key={diff}
                            type="button"
                            onClick={() => setNewDifficulty(diff)}
                            className={`py-2 text-sm rounded-lg border transition-all ${
                              newDifficulty === diff 
                                ? (diff === 'Easy' ? 'bg-green-500/20 border-green-500 text-green-400' :
                                   diff === 'Medium' ? 'bg-orange-500/20 border-orange-500 text-orange-400' :
                                   'bg-red-500/20 border-red-500 text-red-400')
                                : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-slate-500'
                            }`}
                          >
                            {diff}
                          </button>
                        ))}
                      </div>
                    </div>

                    <button 
                      type="submit"
                      disabled={!newTitle.trim()}
                      className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl py-3.5 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                    >
                      <CheckCircle2 size={18} />
                      提交 AC 记录
                    </button>
                  </form>
                </div>
                
                <div className="bg-indigo-900/30 border border-indigo-500/30 rounded-2xl p-5">
                  <h4 className="flex items-center gap-2 text-indigo-300 font-bold mb-2">
                    <TrendingUp size={16} /> Upsolving
                  </h4>
                  <p className="text-sm text-indigo-200/70 leading-relaxed">
                    不要忘了补题（Upsolving）！比赛中没做出来的题，赛后 AC 才是提升实力最快的途径。
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
