<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMer 核心控制台 - 飞龙在天版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

  <!-- 引入 three.js 用于飞龙特效 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <!-- 引入 GLTFLoader 用于加载龙的模型 -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Fira+Code:wght@400;600&display=swap');

    /* === 基础与滚动条 === */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.8); }
    ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.8); border-radius: 0px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(217, 70, 239, 1); }
    .font-sci-fi { font-family: 'Rajdhani', sans-serif; }

    /* === 瞬间爆发特效动画 (飞升版) === */
    @keyframes screen-flash {
      0% { opacity: 1; background: #ffffff; }
      10% { opacity: 0.8; background: #d946ef; } 
      100% { opacity: 0; background: transparent; }
    }
    @keyframes shockwave-expand {
      0% { transform: scale(0); opacity: 1; border-width: 60px; border-color: rgba(217, 70, 239, 1); }
      100% { transform: scale(15); opacity: 0; border-width: 0px; border-color: rgba(6, 182, 212, 0.5); }
    }
    .animate-flash { animation: screen-flash 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-shockwave {
      position: fixed; top: 50%; left: 50%;
      width: 20vw; height: 20vw; margin-top: -10vw; margin-left: -10vw;
      border: 0px solid transparent; border-radius: 50%; pointer-events: none; z-index: 9999;
      animation: shockwave-expand 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    /* === HUD 面板样式 === */
    .hud-panel {
      background: linear-gradient(135deg, rgba(15, 20, 30, 0.8) 0%, rgba(5, 10, 15, 0.95) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(6, 182, 212, 0.3);
      position: relative;
    }
    .hud-clip { clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); }
    .hud-clip-ascended {
      border-color: rgba(217, 70, 239, 0.6);
      box-shadow: 0 0 40px rgba(217, 70, 239, 0.3) inset;
    }

    /* === 能量槽与动态流光 === */
    @keyframes progress-stripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }
    @keyframes gradient-flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .energy-bar-stripes {
      background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent);
      background-size: 40px 40px;
      animation: progress-stripes 1s linear infinite;
    }
    /* 飞升形态专属多色动态渐变条 */
    .bg-ascended-flow {
      background: linear-gradient(90deg, #d946ef, #8b5cf6, #06b6d4, #f59e0b, #d946ef);
      background-size: 300% 100%;
      animation: gradient-flow 3s ease infinite;
    }

    .scanlines {
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
      background-size: 100% 4px; position: absolute; inset: 0; pointer-events: none; opacity: 0.4;
    }

    /* === 专属阅读舱与 MD 排版 (修复代码高亮版) === */
    .reader-glass {
      background: rgba(10, 15, 25, 0.5);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 50px 0 rgba(0, 0, 0, 0.6);
    }

    .md-prose { color: #e2e8f0; font-size: 1.05rem; line-height: 1.8; word-break: break-word; }
    .md-prose h1, .md-prose h2, .md-prose h3, .md-prose h4 { color: #ffffff; font-family: 'Rajdhani', sans-serif; font-weight: 700; margin-top: 1.8em; margin-bottom: 0.8em; letter-spacing: 0.5px; }
    .md-prose h1 { font-size: 2.25rem; border-bottom: 2px solid rgba(6, 182, 212, 0.4); padding-bottom: 0.3em; }
    .md-prose h2 { font-size: 1.75rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 0.3em; }
    .md-prose h3 { font-size: 1.35rem; color: #67e8f9; }
    .md-prose p { margin-bottom: 1.2em; }
    .md-prose ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; color: #cbd5e1; }
    .md-prose ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1.2em; color: #cbd5e1; }
    .md-prose li { margin-bottom: 0.4em; }
    .md-prose strong { color: #f8fafc; font-weight: 700; }
    
    /* 单独的行内代码高亮 (微透粉色) */
    .md-prose code:not(pre code) { 
      font-family: 'Fira Code', monospace; background: rgba(217, 70, 239, 0.15); color: #f472b6; 
      padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; 
    }
    
    /* 核心修复：给大段代码块提供暗黑背景，并允许 Highlight.js 控制文字颜色 */
    .md-prose pre { 
      background: #282a36 !important; /* Dracula 的标准背景色 */
      padding: 1.2em !important; border-radius: 8px; overflow-x: auto; 
      margin: 1.5em 0; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
    }
    .md-prose pre code { 
      background: transparent !important; padding: 0 !important; 
      font-family: 'Fira Code', monospace; font-size: 0.9em; 
    }
    
    .md-prose blockquote { 
      border-left: 4px solid #d946ef; background: linear-gradient(90deg, rgba(217,70,239,0.1) 0%, transparent 100%);
      padding: 1em 1.5em; margin: 1.5em 0; color: #94a3b8; font-style: italic; border-radius: 0 8px 8px 0;
    }
    .md-prose a { color: #38bdf8; text-decoration: none; border-bottom: 1px solid transparent; transition: all 0.3s; }
    .md-prose a:hover { color: #7dd3fc; border-bottom: 1px solid #7dd3fc; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5); }
    .md-prose img { max-width: 100%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin: 1.5em 0; }
  </style>
</head>
<body class="bg-[#030305] text-slate-200 overflow-x-hidden selection:bg-fuchsia-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Flame, CheckCircle2, Swords, Search, Tag, ImageIcon,
      Plus, FileText, Upload, ArrowLeft, TerminalSquare, Trash2, Target, Zap
    } from 'https://esm.sh/lucide-react@0.263.1';

    // 核心修复：配置 Marked 在解析时同步调用 Highlight.js，确保代码完美着色
    marked.setOptions({
      breaks: true, 
      gfm: true,
      highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try { return hljs.highlight(code, { language: lang }).value; } catch (__) {}
        }
        return hljs.highlightAuto(code).value;
      },
      langPrefix: 'hljs language-' // 必需，赋予代码块特定的 CSS class 前缀
    });

    // ==========================================
    // 全新双形态引擎：星云漩涡 (低功耗) + 飞龙在天 (高功耗 3D)
    // ==========================================
    const DualEngineBackground = ({ isGodMode, burstTrigger }) => {
      const canvasRef = useRef(null);
      const threeContainerRef = useRef(null);
      const rendererRef = useRef(null);
      const sceneRef = useRef(null);
      const cameraRef = useRef(null);
      const dragonRef = useRef(null);
      const mixerRef = useRef(null);
      const clockRef = useRef(new THREE.Clock());
      const cloudsRef = useRef([]);

      // ====================
      // 形态一：星云漩涡 (Canvas 2D) - < 5 题
      // ====================
      useEffect(() => {
        if (isGodMode) return; // 如果是超神模式，不启动这个 2D 引擎

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d', { alpha: false });
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 800; // 显著增加粒子数量

        class Particle {
          constructor() {
            this.reset();
            this.angle = Math.random() * Math.PI * 2;
            this.radius = Math.random() * (width > height ? width : height);
          }
          reset() {
            this.angle = Math.random() * Math.PI * 2;
            this.radius = Math.random() * 60; // 稍微增大核心区域
            this.speed = (Math.random() * 1.5 + 0.5);
            this.size = Math.random() * 2 + 0.5;
            this.colorOffset = Math.random() * 360;
          }
          update() {
            // 平稳涡流，速度稍慢，显得更宏大
            this.angle += 0.003;
            this.radius += this.speed * 0.4;
            
            this.x = width / 2 + Math.cos(this.angle) * this.radius;
            this.y = height / 2 + Math.sin(this.angle) * this.radius;

            if (this.radius > (width > height ? width : height)) this.reset();
          }
          draw(ctx, time) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            
            const alpha = Math.max(0, 1 - (this.radius / (width * 0.7))); // 增大透明度衰减半径
            
            // 赛博青 + 一点点紫色偏色
            const hue = (190 + this.colorOffset * 0.1 + time * 0.1) % 360;
            ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
            // 移除 shadowBlur 以提升性能，粒子够多就有效果了
            ctx.fill();
          }
        }

        for (let i = 0; i < particleCount; i++) particles.push(new Particle());

        let animationId;
        let globalTime = 0;

        const animate = () => {
          globalTime += 1;
          ctx.fillStyle = 'rgba(2, 5, 10, 0.3)'; // 拖尾效果
          ctx.fillRect(0, 0, width, height);

          // 核心发光
          const coreRadius = 120 + Math.sin(globalTime*0.05)*30; // 增大核心
          const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, coreRadius * 3);
          gradient.addColorStop(0, 'rgba(6, 182, 212, 0.15)');
          gradient.addColorStop(1, 'transparent');
          ctx.fillStyle = gradient;
          ctx.fillRect(0,0,width,height);

          ctx.globalCompositeOperation = 'lighter';
          particles.forEach(p => {
            p.update();
            p.draw(ctx, globalTime);
          });
          ctx.globalCompositeOperation = 'source-over';

          animationId = requestAnimationFrame(animate);
        };

        animate();

        const handleResize = () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; };
        window.addEventListener('resize', handleResize);
        return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', handleResize); };
      }, [isGodMode]); // 仅在非 God Mode 下运行

      // ====================
      // 形态二：飞龙在天 (Three.js 3D) - >= 5 题
      // ====================
      useEffect(() => {
        if (!isGodMode) return; // 如果不是超神模式，不启动这个 3D 引擎

        const container = threeContainerRef.current;
        let width = window.innerWidth;
        let height = window.innerHeight;

        // 1. 初始化场景、相机、渲染器
        const scene = new THREE.Scene();
        sceneRef.current = scene;
        // 七彩祥云背景色
        scene.background = new THREE.Color(0x1a1a2e); 
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.001);

        const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 2000);
        camera.position.set(0, 50, 300);
        camera.lookAt(0, 0, 0);
        cameraRef.current = camera;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        rendererRef.current = renderer;

        // 2. 添加灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffd700, 1); // 金光
        directionalLight.position.set(100, 200, 100);
        scene.add(directionalLight);
        // 添加一些彩色的点光源来模拟祥云反光
        const pLight1 = new THREE.PointLight(0x00ffff, 1, 500); pLight1.position.set(200, 100, 0); scene.add(pLight1);
        const pLight2 = new THREE.PointLight(0xff00ff, 1, 500); pLight2.position.set(-200, 100, 0); scene.add(pLight2);

        // 3. 创建七彩祥云 (用粒子系统模拟)
        const cloudGeo = new THREE.BufferGeometry();
        const cloudCount = 2000;
        const posArray = new Float32Array(cloudCount * 3);
        const colorArray = new Float32Array(cloudCount * 3);
        for(let i=0; i<cloudCount*3; i+=3) {
            posArray[i] = (Math.random()-0.5) * 1000;
            posArray[i+1] = (Math.random()-0.5) * 200 + 50; // 扁平分布
            posArray[i+2] = (Math.random()-0.5) * 1000;
            
            // 七彩颜色
            const color = new THREE.Color();
            color.setHSL(Math.random(), 0.8, 0.6);
            colorArray[i] = color.r; colorArray[i+1] = color.g; colorArray[i+2] = color.b;
        }
        cloudGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        cloudGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
        // 使用一个简单的圆形贴图来模拟云朵/光晕
        const sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
        const cloudMat = new THREE.PointsMaterial({ 
            size: 30, vertexColors: true, map: sprite, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false
        });
        const cloudParticles = new THREE.Points(cloudGeo, cloudMat);
        scene.add(cloudParticles);
        cloudsRef.current = cloudParticles;


        // 4. 加载飞龙模型 (使用一个开源的低模龙作为占位，实际需要更精细的模型)
        // 注意：这里使用了一个在线的 GLTF 模型 URL。如果失效，需要替换。
        const loader = new THREE.GLTFLoader();
        // 一个简单的东方龙模型 URL (低面数)
        const dragonModelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb';
        
        loader.load(dragonModelUrl, (gltf) => {
            const dragon = gltf.scene;
            dragon.scale.set(30, 30, 30); // 调整大小
            dragon.position.set(0, 0, 0);
            // 给龙添加一个发光的材质
            dragon.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xffd700, // 金色
                        emissive: 0xffaa00, // 发光色
                        emissiveIntensity: 0.5,
                        roughness: 0.3,
                        metalness: 0.8
                    });
                }
            });
            scene.add(dragon);
            dragonRef.current = dragon;

            // 如果模型有动画，可以在这里播放 (这个示例模型可能没有飞行动画)
            // mixerRef.current = new THREE.AnimationMixer(dragon);
            // const action = mixerRef.current.clipAction(gltf.animations[0]);
            // action.play();
        }, undefined, (error) => {
            console.error('An error happened loading the dragon model:', error);
        });


        // 5. 动画循环
        let animationId;
        const animate = () => {
            animationId = requestAnimationFrame(animate);
            const delta = clockRef.current.getDelta();
            const time = clockRef.current.getElapsedTime();

            if (mixerRef.current) mixerRef.current.update(delta);

            // 让龙沿 8 字形轨迹飞行
            if (dragonRef.current) {
                const t = time * 0.3;
                dragonRef.current.position.x = Math.sin(t) * 150;
                dragonRef.current.position.y = Math.cos(t * 2) * 50 + 50;
                dragonRef.current.position.z = Math.cos(t) * 150;
                // 让龙头朝向飞行方向 (简单近似)
                dragonRef.current.lookAt(
                    Math.sin(t + 0.1) * 150,
                    Math.cos((t + 0.1) * 2) * 50 + 50,
                    Math.cos(t + 0.1) * 150
                );
            }

            // 让祥云缓慢流动旋转
            if (cloudsRef.current) {
                cloudsRef.current.rotation.y = time * 0.02;
            }

            renderer.render(scene, camera);
        };
        animate();

        const handleResize = () => {
            width = window.innerWidth; height = window.innerHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        };
        window.addEventListener('resize', handleResize);

        // 清理函数
        return () => {
            cancelAnimationFrame(animationId);
            window.removeEventListener('resize', handleResize);
            if (rendererRef.current && container) {
                container.removeChild(rendererRef.current.domElement);
            }
            // 释放 Three.js 资源
            scene.traverse((object) => {
                if (object.geometry) object.geometry.dispose();
                if (object.material) {
                    if (Array.isArray(object.material)) object.material.forEach(m => m.dispose());
                    else object.material.dispose();
                }
            });
        };
      }, [isGodMode]); // 仅在 God Mode 下运行

      return (
        <>
          {/* 形态一的 Canvas，在非 God Mode 时显示 */}
          <canvas 
            ref={canvasRef} 
            className={`fixed inset-0 z-0 pointer-events-none transition-opacity duration-1000 ${isGodMode ? 'opacity-0' : 'opacity-100'}`} 
          />
          {/* 形态二的 Three.js 容器，在 God Mode 时显示 */}
          <div 
            ref={threeContainerRef} 
            className={`fixed inset-0 z-0 pointer-events-none transition-opacity duration-1000 ${isGodMode ? 'opacity-100' : 'opacity-0'}`}
          />
        </>
      );
    };

    // ==========================================
    // 独立页面：Markdown 题解阅读舱
    // ==========================================
    const MarkdownViewer = ({ problem, onBack, bgImage, setBgImage }) => {
      const contentRef = useRef(null);
      const [showBgSettings, setShowBgSettings] = useState(false);

      useEffect(() => {
        // 由于 marked 已经在解析时完成了高亮，这里只需调用 MathJax 渲染公式即可
        if (window.MathJax) { window.MathJax.typesetPromise([contentRef.current]).catch((err) => console.log(err)); }
      }, [problem]);

      const handleBgImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            let w = img.width; let h = img.height;
            if (w > h && w > 1920) { h *= 1920/w; w = 1920; } else if (h > 1080) { w *= 1080/h; h = 1080; }
            canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
            setBgImage(canvas.toDataURL('image/jpeg', 0.8)); setShowBgSettings(false);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="min-h-screen relative font-sans animate-[fadeIn_0.3s_ease-out]">
          {bgImage ? (
            <div className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat bg-fixed opacity-70" style={{ backgroundImage: `url(${bgImage})` }} />
          ) : ( <div className="fixed inset-0 z-0 bg-[#08080c]" /> )}

          <div className="fixed top-0 left-0 right-0 z-50 reader-glass border-b border-cyan-500/30">
            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <button onClick={onBack} className="flex items-center gap-2 text-cyan-400 hover:text-cyan-300 font-sci-fi font-bold px-4 py-2 bg-cyan-950/50 rounded-none border-l-4 border-cyan-500 transition-all hover:pr-6">
                <ArrowLeft size={18} /> 撤离舱室 / BACK
              </button>
              <div className="flex items-center gap-4">
                <button onClick={() => setShowBgSettings(!showBgSettings)} className="p-2 text-slate-300 hover:text-cyan-400 bg-black/50 border border-slate-600 transition-all">
                  <ImageIcon size={20} />
                </button>
              </div>
            </div>
            
            {showBgSettings && (
              <div className="absolute top-16 right-4 mt-2 p-4 bg-slate-900 border border-cyan-500 rounded-none shadow-2xl w-80">
                <label className="block text-sm font-sci-fi font-bold text-cyan-400 mb-3 uppercase">WallPaper Settings</label>
                <label className="cursor-pointer flex flex-col items-center justify-center gap-2 w-full py-6 border-2 border-dashed border-cyan-500/40 hover:bg-cyan-900/30 transition-all text-slate-300">
                  <Upload size={24} className="text-cyan-400"/> 
                  <span className="font-bold text-sm">导入沉浸背景图</span>
                  <input type="file" accept="image/*" onChange={handleBgImageUpload} className="hidden" />
                </label>
                {bgImage && (
                  <button onClick={() => {setBgImage(''); setShowBgSettings(false)}} className="w-full mt-3 py-2 bg-red-950/50 text-red-400 font-bold border border-red-900 hover:bg-red-900/80">清除背景</button>
                )}
              </div>
            )}
          </div>

          <div className="relative z-10 pt-28 pb-20 px-4 md:px-8">
            <div className="max-w-4xl mx-auto reader-glass p-6 md:p-12 shadow-2xl hud-clip border-t-4 border-cyan-500">
              <div className="border-b border-slate-700/60 pb-6 mb-8">
                <div className="flex items-center gap-3 mb-4 font-sci-fi">
                  <span className="px-3 py-1 bg-cyan-950 text-cyan-400 font-bold text-sm border border-cyan-800">{problem.platform}</span>
                  <span className="text-slate-500 text-sm ml-auto tracking-widest">{problem.date}</span>
                </div>
                <h1 className="text-3xl md:text-5xl font-sci-fi font-black text-white leading-tight mb-4 tracking-wide">{problem.title}</h1>
                <div className="flex flex-wrap gap-2">
                  {problem.tags && problem.tags.map((tag, idx) => (
                    <span key={idx} className="text-xs px-2 py-1 bg-black/60 text-slate-300 border border-slate-700 flex items-center gap-1 font-mono"><Tag size={12}/> {tag}</span>
                  ))}
                </div>
              </div>
              <div 
                ref={contentRef}
                className="md-prose"
                dangerouslySetInnerHTML={{ __html: marked.parse(problem.markdown || '> *该节点暂无详细记忆数据。*') }}
              />
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 主应用程序
    // ==========================================
    const App = () => {
      const [view, setView] = useState('home');
      const [viewingProblem, setViewingProblem] = useState(null);

      const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const [problems, setProblems] = useState(() => {
        const savedData = localStorage.getItem('acmer_data_v5');
        return savedData ? JSON.parse(savedData) : [];
      });
      const [readerBg, setReaderBg] = useState(() => localStorage.getItem('acmer_reader_bg') || '');

      useEffect(() => { localStorage.setItem('acmer_data_v5', JSON.stringify(problems)); }, [problems]);
      useEffect(() => { localStorage.setItem('acmer_reader_bg', readerBg); }, [readerBg]);

      const [newPlatform, setNewPlatform] = useState('Codeforces');
      const [newTitle, setNewTitle] = useState('');
      const [newDifficulty, setNewDifficulty] = useState('中等');
      const [newTags, setNewTags] = useState('');
      const [markdownContent, setMarkdownContent] = useState('');
      const [searchQuery, setSearchQuery] = useState('');

      const todayCount = problems.filter(p => p.date === getTodayStr()).length;
      
      const [isGodMode, setIsGodMode] = useState(todayCount >= 5);
      const [flashEffect, setFlashEffect] = useState(false);
      const prevCountRef = useRef(todayCount);

      useEffect(() => {
        setIsGodMode(todayCount >= 5);
        if (prevCountRef.current < 5 && todayCount >= 5) {
          setFlashEffect(true);
          setTimeout(() => setFlashEffect(false), 1500);
        }
        prevCountRef.current = todayCount;
      }, [todayCount]);

      const handleAddProblem = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;
        const newProblem = {
          id: Date.now(), title: newTitle, platform: newPlatform,
          date: getTodayStr(), difficulty: newDifficulty,
          tags: newTags.split(',').map(t => t.trim()).filter(t => t !== ''),
          markdown: markdownContent 
        };
        setProblems([newProblem, ...problems]);
        setNewTitle(''); setNewTags(''); setMarkdownContent('');
      };

      const handleDeleteProblem = (id) => {
        if (window.confirm('警告：数据删除后无法恢复，确认抹除该记录？')) {
          setProblems(problems.filter(p => p.id !== id));
        }
      };

      const handleMdFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => setMarkdownContent(event.target.result);
        reader.readAsText(file);
      };

      const openReader = (problem) => { setViewingProblem(problem); setView('viewer'); window.scrollTo(0, 0); };

      const getStatusEffect = (count) => {
        if (count === 0) return { label: 'SYSTEM SLEEPING', color: 'text-slate-500', glow: '' };
        if (count <= 2) return { label: 'ENGINE IGNITION', color: 'text-cyan-400', glow: 'shadow-[0_0_30px_rgba(6,182,212,0.15)]' };
        if (count <= 4) return { label: 'UNSTOPPABLE', color: 'text-blue-400', glow: 'shadow-[0_0_40px_rgba(59,130,246,0.3)]' };
        return { 
          label: 'DRAGON ASCENDED // 飞龙在天', 
          color: 'text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-red-500 to-fuchsia-500 animate-pulse font-black', 
          glow: 'hud-clip-ascended' 
        };
      };
      const currentStatus = getStatusEffect(todayCount);

      const filteredProblems = problems.filter(p => {
        const query = searchQuery.toLowerCase();
        const tagMatch = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
        return p.title.toLowerCase().includes(query) || p.platform.toLowerCase().includes(query) || tagMatch;
      });

      if (view === 'viewer' && viewingProblem) {
        return <MarkdownViewer problem={viewingProblem} onBack={() => setView('home')} bgImage={readerBg} setBgImage={setReaderBg} />;
      }

      return (
        <div className="min-h-screen relative font-sans">
          
          {flashEffect && (
            <div className="fixed inset-0 z-50 pointer-events-none animate-flash mix-blend-overlay flex items-center justify-center">
               <div className="animate-shockwave"></div>
            </div>
          )}

          {/* 底层双形态引擎 */}
          <DualEngineBackground isGodMode={isGodMode} burstTrigger={flashEffect} />

          <div className="max-w-7xl mx-auto space-y-8 relative z-10 p-4 md:p-8">
            
            <header className="flex items-center justify-between hud-panel p-5 hud-clip">
              <div className="scanlines"></div>
              <div className="flex items-center gap-4 relative z-10">
                <div className={`p-3 border ${isGodMode ? 'bg-fuchsia-950/50 border-fuchsia-500 text-fuchsia-400 shadow-[0_0_20px_#d946ef]' : 'bg-cyan-950/50 border-cyan-500 text-cyan-400'}`}>
                  <TerminalSquare size={28} />
                </div>
                <div>
                  <h1 className="text-2xl md:text-3xl font-sci-fi font-black text-white tracking-widest uppercase">
                    ACMer <span className={isGodMode ? 'text-fuchsia-400 drop-shadow-[0_0_10px_#d946ef]' : 'text-cyan-400'}>NEXUS</span>
                  </h1>
                  <p className="text-slate-500 text-xs font-mono tracking-widest mt-1">v3.0 // HUD_ONLINE</p>
                </div>
              </div>
              <div className="text-right hidden md:block relative z-10">
                <p className="text-xs text-slate-500 font-sci-fi font-bold uppercase tracking-widest">TOTAL AC</p>
                <p className="text-4xl font-sci-fi font-black text-white">{problems.length}</p>
              </div>
            </header>

            <section className={`hud-panel p-8 md:p-10 hud-clip ${currentStatus.glow} transition-all duration-700`}>
              <div className="scanlines"></div>
              <div className="flex flex-col md:flex-row items-center justify-between gap-8 relative z-10">
                
                <div className="flex items-center gap-6 w-full md:w-auto">
                  <div className={`p-6 border-l-4 ${isGodMode ? 'bg-fuchsia-950/30 border-fuchsia-500 shadow-[0_0_40px_rgba(217,70,239,0.4)]' : 'bg-black/50 border-slate-600'}`}>
                    {isGodMode ? <Flame size={60} className="text-fuchsia-500" /> : <Zap size={60} className={currentStatus.color} />}
                  </div>
                  <div>
                    <p className="text-xs font-mono text-slate-500 mb-1 tracking-widest uppercase flex items-center gap-2">
                      <Target size={14}/> Current Protocol
                    </p>
                    <h2 className={`text-4xl md:text-6xl font-sci-fi font-black tracking-wider ${currentStatus.color}`} style={{ textShadow: isGodMode ? '0 0 30px rgba(217,70,239,0.6)' : 'none' }}>
                      {currentStatus.label}
                    </h2>
                    <p className="text-slate-400 mt-2 text-lg font-sci-fi font-bold tracking-widest uppercase">
                      TODAY AC: <span className="text-4xl text-white ml-2">{todayCount}</span>
                    </p>
                  </div>
                </div>
                
                <div className="w-full md:w-[400px] flex flex-col gap-2">
                  <div className="flex justify-between text-xs font-sci-fi font-bold tracking-widest text-slate-400 uppercase">
                    <span>Energy Power</span>
                    <span className={isGodMode ? 'text-fuchsia-400' : 'text-cyan-400'}>Target: 5</span>
                  </div>
                  <div className="w-full h-8 bg-black/80 border border-slate-700 p-1" style={{ transform: 'skewX(-15deg)' }}>
                    <div 
                      className={`h-full transition-all duration-1000 ease-out energy-bar-stripes ${isGodMode ? 'bg-ascended-flow shadow-[0_0_25px_#d946ef]' : 'bg-gradient-to-r from-cyan-800 to-cyan-400 shadow-[0_0_15px_#06b6d4]'}`}
                      style={{ width: `${Math.min((todayCount / 5) * 100, 100)}%` }}
                    ></div>
                  </div>
                </div>

              </div>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              <div className="lg:col-span-2 hud-panel flex flex-col border-t-4 border-t-cyan-500" style={{ maxHeight: '800px' }}>
                <div className="scanlines"></div>
                <div className="p-6 border-b border-cyan-500/20 bg-black/40 flex flex-col sm:flex-row sm:items-center justify-between gap-4 relative z-10">
                  <h3 className="font-sci-fi font-black text-white flex items-center gap-3 text-xl tracking-widest uppercase">
                    <CheckCircle2 size={24} className="text-cyan-400" />
                    Data Archive
                  </h3>
                  <div className="relative w-full sm:w-80">
                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500 w-4 h-4" />
                    <input type="text" placeholder="检索 ID / 标签..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-12 pr-4 py-2.5 bg-black/80 border border-slate-700 text-slate-100 font-mono text-sm focus:border-cyan-500 outline-none" style={{ transform: 'skewX(-5deg)' }}
                    />
                  </div>
                </div>
                
                <div className="divide-y divide-slate-800/80 overflow-y-auto flex-1 p-4 space-y-3 relative z-10">
                  {filteredProblems.map(problem => (
                    <div key={problem.id} className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-4 bg-black/40 hover:bg-cyan-950/20 border border-slate-800 hover:border-cyan-500/50 transition-all group">
                      
                      <div className="flex items-center gap-5">
                        <div className="text-cyan-400 border border-cyan-800 bg-black font-sci-fi font-bold px-3 py-1 text-sm tracking-widest uppercase" style={{ transform: 'skewX(-10deg)' }}>
                          <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>{problem.platform}</span>
                        </div>
                        <div className="flex flex-col gap-1">
                          <span className="font-bold text-slate-100 text-lg group-hover:text-cyan-400 transition-colors font-sci-fi tracking-wide">
                            {problem.title}
                          </span>
                          <div className="flex gap-2">
                            {problem.tags && problem.tags.slice(0,3).map((tag, idx) => (
                              <span key={idx} className="text-xs text-slate-500 font-mono">#{tag}</span>
                            ))}
                          </div>
                        </div>
                      </div>

                      <div className="flex items-center gap-3 shrink-0 mt-2 sm:mt-0">
                        <span className={`text-xs px-4 py-1.5 font-black uppercase tracking-widest border ${
                          problem.difficulty === '困难' ? 'bg-red-950/30 text-red-500 border-red-900/80' :
                          problem.difficulty === '中等' ? 'bg-orange-950/30 text-orange-400 border-orange-900/80' :
                          'bg-green-950/30 text-green-400 border-green-900/80'
                        }`} style={{ transform: 'skewX(-10deg)' }}>
                           <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>{problem.difficulty}</span>
                        </span>
                        
                        <button onClick={() => openReader(problem)}
                          className="flex items-center gap-2 px-4 py-2 bg-cyan-950/50 hover:bg-cyan-600 text-cyan-400 hover:text-white font-sci-fi font-bold border border-cyan-800 hover:border-cyan-400 transition-all uppercase tracking-widest text-sm"
                          style={{ transform: 'skewX(-10deg)' }}
                        >
                          <span className="flex items-center gap-1" style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>
                            <FileText size={14} className="inline mr-1"/>{problem.markdown ? 'READ_MD' : 'DETAIL'}
                          </span>
                        </button>

                        <button onClick={() => handleDeleteProblem(problem.id)} className="p-2 bg-red-950/30 hover:bg-red-600 text-red-500 hover:text-white transition-all border border-red-900/50" title="PURGE DATA">
                          <Trash2 size={16} />
                        </button>
                      </div>

                    </div>
                  ))}
                  {filteredProblems.length === 0 && (
                    <div className="p-16 text-center text-slate-600 font-sci-fi font-black text-xl tracking-widest flex flex-col items-center gap-4">
                      <Swords size={64} className="opacity-30" />
                      SYSTEM_EMPTY // NO DATA
                    </div>
                  )}
                </div>
              </div>

              <div className="hud-panel p-6 md:p-8 border-t-4 border-t-blue-500">
                <div className="scanlines"></div>
                <h3 className="text-2xl font-sci-fi font-black text-white mb-8 flex items-center gap-3 tracking-widest uppercase relative z-10">
                  <Plus size={24} className="text-blue-400" />
                  INPUT_DATA
                </h3>
                
                <form onSubmit={handleAddProblem} className="space-y-6 relative z-10">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2 font-mono uppercase">Platform</label>
                    <select value={newPlatform} onChange={(e) => setNewPlatform(e.target.value)} className="w-full bg-black/60 border border-slate-700 text-slate-100 px-4 py-3 focus:border-blue-500 outline-none font-sci-fi font-bold text-base tracking-widest uppercase" style={{ transform: 'skewX(-5deg)' }}>
                      <option>Codeforces</option> <option>AtCoder</option> <option>LeetCode</option> <option>Luogu</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2 font-mono uppercase">Problem Title</label>
                    <input type="text" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} placeholder="e.g. A. Watermelon" className="w-full bg-black/60 border border-slate-700 text-slate-100 px-4 py-3 focus:border-blue-500 outline-none font-bold text-base" style={{ transform: 'skewX(-5deg)' }} />
                  </div>

                  <div className="p-4 bg-black/40 border border-slate-700/80 relative">
                    <label className="flex items-center justify-between text-xs font-bold text-cyan-500 mb-3 font-mono uppercase">
                      <span className="flex items-center gap-2"><FileText size={14}/> MD_Payload</span>
                      <label className="cursor-pointer bg-cyan-950/50 text-cyan-400 px-2 py-1 border border-cyan-800 hover:bg-cyan-900 transition-colors flex items-center gap-1" style={{ transform: 'skewX(-10deg)' }}>
                        <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}><Upload size={12} className="inline mr-1"/>Import_MD</span>
                        <input type="file" accept=".md,.txt" onChange={handleMdFileUpload} className="hidden" />
                      </label>
                    </label>
                    <textarea value={markdownContent} onChange={(e) => setMarkdownContent(e.target.value)} placeholder={`输入 Markdown 数据...\n支持 $$LaTeX$$ 与 \`\`\`cpp 代码块`} rows="5" className="w-full bg-transparent border-t border-slate-800 text-slate-300 pt-3 focus:outline-none font-mono text-sm leading-relaxed" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2 font-mono uppercase">Tags</label>
                    <input type="text" value={newTags} onChange={(e) => setNewTags(e.target.value)} placeholder="DP, 图论, 数学..." className="w-full bg-black border border-slate-700 text-slate-100 rounded-lg px-4 py-3 focus:border-blue-500 transition-all font-bold" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-3 font-mono uppercase">Difficulty Level</label>
                    <div className="grid grid-cols-3 gap-3">
                      {['简单', '中等', '困难'].map(diff => (
                        <button key={diff} type="button" onClick={() => setNewDifficulty(diff)}
                          className={`py-2 text-sm border font-sci-fi font-bold tracking-widest uppercase transition-all ${
                            newDifficulty === diff 
                              ? (diff === '简单' ? 'bg-green-950/50 border-green-500 text-green-400' :
                                 diff === '中等' ? 'bg-orange-950/50 border-orange-500 text-orange-400' :
                                 'bg-red-950/50 border-red-500 text-red-500')
                              : 'bg-black/50 border-slate-800 text-slate-600 hover:border-slate-600'
                          }`}
                          style={{ transform: 'skewX(-10deg)' }}
                        >
                          <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>{diff}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" disabled={!newTitle.trim()}
                    className="w-full mt-8 bg-blue-600 hover:bg-blue-500 text-white font-sci-fi font-black py-4 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-3 uppercase tracking-widest text-lg"
                    style={{ transform: 'skewX(-10deg)' }}
                  >
                    <span className="flex items-center gap-2" style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>
                      <Swords size={20} className="inline mr-2" /> EXECUTE_WRITE
                    </span>
                  </button>
                </form>
              </div>

            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
