<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMer 核心控制台 - 究极形态</title>
  
  <!-- Tailwind CSS & Typography (用于 Markdown 排版) -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Marked.js (Markdown 解析) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Highlight.js (代码高亮) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

  <!-- MathJax (LaTeX 数学公式渲染) -->
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      startup: { typeset: false } // 手动触发渲染
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    /* 全局滚动条美化 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.6); }
    ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.6); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(239, 68, 68, 0.8); }

    /* 炫酷彩色动态流光背景 */
    @keyframes colorFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .colorful-overlay {
      background: linear-gradient(-45deg, rgba(255, 0, 128, 0.15), rgba(0, 204, 255, 0.15), rgba(0, 255, 128, 0.15), rgba(255, 204, 0, 0.15));
      background-size: 400% 400%;
      animation: colorFlow 10s ease infinite;
    }

    @keyframes hyper-glow {
      0%, 100% { box-shadow: 0 0 50px rgba(239, 68, 68, 0.6), inset 0 0 30px rgba(239, 68, 68, 0.4); border-color: rgba(255,50,50,0.8); }
      50% { box-shadow: 0 0 100px rgba(239, 68, 68, 1), inset 0 0 60px rgba(239, 68, 68, 0.8); border-color: rgba(255,150,150,1); }
    }
    .animate-hyper-glow { animation: hyper-glow 1s ease-in-out infinite; }
    
    /* 极致毛玻璃面板 */
    .glass-panel {
      background: rgba(10, 15, 25, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    }
    
    /* MD 阅读舱专属毛玻璃 - 显著提升通透度与色彩饱和度 */
    .reader-glass {
      background: rgba(15, 25, 45, 0.35);
      backdrop-filter: blur(25px) saturate(150%);
      -webkit-backdrop-filter: blur(25px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Markdown 内部排版优化 */
    .prose pre { 
      background: rgba(0, 0, 0, 0.4) !important; 
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 0 !important; margin-top: 1.5em; margin-bottom: 1.5em; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); 
    }
    .prose code { color: #67e8f9 !important; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .prose pre code { color: inherit !important; padding: 1rem !important; display: block; overflow-x: auto; background: transparent !important; }
    .prose p, .prose li { color: #cbd5e1 !important; line-height: 1.8; }
    .prose h1, .prose h2, .prose h3, .prose h4 { color: #f8fafc !important; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
    .prose a { color: #38bdf8 !important; text-decoration: none; }
    .prose a:hover { text-decoration: underline; }
    .prose blockquote { border-left-color: #06b6d4 !important; background: rgba(6,182,212,0.1); padding: 0.5rem 1rem; font-style: normal !important; color: #94a3b8 !important;}
  </style>
</head>
<body class="bg-black text-slate-200 overflow-x-hidden selection:bg-cyan-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Trophy, Flame, Code2, CheckCircle2, 
      Swords, Activity, Search, Tag, Settings, Image as ImageIcon,
      X, Plus, FileText, Upload, ArrowLeft, TerminalSquare, Trash2
    } from 'https://esm.sh/lucide-react@0.263.1';

    // ==========================================
    // 炫酷彩色霓虹粒子网引擎 (Canvas) - 彻底重构的无限制彩色效果
    // ==========================================
    const NeonPlexusBackground = ({ isGodMode }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        const numParticles = isGodMode ? 90 : 50; 
        let globalHue = 0;

        for (let i = 0; i < numParticles; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * (isGodMode ? 3 : 0.8),
            vy: (Math.random() - 0.5) * (isGodMode ? 3 : 0.8),
            colorOffset: Math.random() * 360,
            size: Math.random() * 2 + 1
          });
        }

        let animationFrameId;

        const draw = () => {
          ctx.globalCompositeOperation = 'source-over';
          ctx.fillStyle = isGodMode ? 'rgba(5, 5, 10, 0.2)' : 'rgba(5, 10, 20, 0.4)';
          ctx.fillRect(0, 0, width, height);
          
          // 在超神模式下开启高光叠加混合，制造迷幻感
          ctx.globalCompositeOperation = isGodMode ? 'lighter' : 'source-over';
          globalHue += isGodMode ? 1.5 : 0.2;

          const connectDistance = isGodMode ? 180 : 120;

          for (let i = 0; i < numParticles; i++) {
            let p = particles[i];
            
            p.x += p.vx;
            p.y += p.vy;

            // 边缘反弹
            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = isGodMode ? `hsl(${(globalHue + p.colorOffset) % 360}, 100%, 65%)` : 'rgba(6, 182, 212, 0.8)';
            ctx.fill();

            // 绘制连线与彩色发光几何体
            for (let j = i + 1; j < numParticles; j++) {
              let p2 = particles[j];
              let dx = p.x - p2.x;
              let dy = p.y - p2.y;
              let dist = Math.sqrt(dx * dx + dy * dy);

              if (dist < connectDistance) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineWidth = isGodMode ? 1.5 : 0.8;
                ctx.strokeStyle = isGodMode 
                  ? `hsla(${(globalHue + p.colorOffset) % 360}, 100%, 60%, ${1 - dist / connectDistance})`
                  : `rgba(6, 182, 212, ${1 - dist / connectDistance})`;
                ctx.stroke();

                if (isGodMode) {
                  for (let k = j + 1; k < numParticles; k++) {
                    let p3 = particles[k];
                    let dx2 = p2.x - p3.x;
                    let dy2 = p2.y - p3.y;
                    let dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    
                    // 当三个点互相靠近时，渲染彩色多边形叠加色
                    if (dist2 < connectDistance) {
                       ctx.beginPath();
                       ctx.moveTo(p.x, p.y);
                       ctx.lineTo(p2.x, p2.y);
                       ctx.lineTo(p3.x, p3.y);
                       ctx.closePath();
                       ctx.fillStyle = `hsla(${(globalHue + p.colorOffset) % 360}, 100%, 50%, ${0.04 * (1 - dist/connectDistance)})`;
                       ctx.fill();
                    }
                  }
                }
              }
            }
          }

          animationFrameId = requestAnimationFrame(draw);
        };

        draw();

        const handleResize = () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', handleResize);

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', handleResize);
        };
      }, [isGodMode]);

      return (
        <canvas 
          ref={canvasRef} 
          className="fixed inset-0 z-0 pointer-events-none"
        />
      );
    };

    // ==========================================
    // 独立页面：Markdown 题解阅读舱
    // ==========================================
    const MarkdownViewer = ({ problem, onBack, bgImage, setBgImage }) => {
      const contentRef = useRef(null);
      const [showBgSettings, setShowBgSettings] = useState(false);

      useEffect(() => {
        // 1. 渲染代码高亮
        if (contentRef.current) {
          contentRef.current.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
          });
        }
        // 2. 渲染 LaTeX 公式
        if (window.MathJax) {
          window.MathJax.typesetPromise([contentRef.current]).catch((err) => console.log(err));
        }
      }, [problem]);

      // 处理背景上传
      const handleBgImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const MAX_WIDTH = 1920; const MAX_HEIGHT = 1080;
            let width = img.width; let height = img.height;
            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
            canvas.width = width; canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            setBgImage(canvas.toDataURL('image/jpeg', 0.8));
            setShowBgSettings(false);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="min-h-screen relative font-sans animate-[fadeIn_0.3s_ease-out]">
          {/* 阅读舱专属背景 */}
          {bgImage ? (
            <div className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat bg-fixed opacity-60 transition-all duration-1000" style={{ backgroundImage: `url(${bgImage})` }} />
          ) : (
            <div className="fixed inset-0 z-0 bg-slate-900" />
          )}

          {/* 顶部导航 */}
          <div className="fixed top-0 left-0 right-0 z-50 reader-glass border-b border-slate-700/50 shadow-lg">
            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <button onClick={onBack} className="flex items-center gap-2 text-cyan-400 hover:text-cyan-300 transition-all font-bold px-4 py-2 bg-cyan-950/50 rounded-lg border border-cyan-800">
                <ArrowLeft size={18} /> 撤离阅读舱
              </button>
              
              <div className="flex items-center gap-4">
                <span className="text-slate-400 font-mono text-sm hidden sm:block">SYSTEM // READER_MODE</span>
                <button onClick={() => setShowBgSettings(!showBgSettings)} className="p-2 text-slate-300 hover:text-white bg-slate-800 rounded-lg border border-slate-600 transition-all">
                  <ImageIcon size={20} />
                </button>
              </div>
            </div>
            
            {/* 背景设置下拉面板 */}
            {showBgSettings && (
              <div className="absolute top-16 right-4 mt-2 p-4 bg-slate-800 border border-cyan-500/50 rounded-xl shadow-2xl w-80 animate-[fadeIn_0.2s_ease-out]">
                <label className="block text-sm font-bold text-cyan-300 mb-3">阅读舱壁纸设定</label>
                <label className="cursor-pointer flex flex-col items-center justify-center gap-2 w-full py-6 border-2 border-dashed border-cyan-500/40 rounded-xl hover:bg-cyan-900/30 transition-all text-slate-300">
                  <Upload size={24} className="text-cyan-400"/> 
                  <span className="font-bold text-sm">选择本地图片</span>
                  <input type="file" accept="image/*" onChange={handleBgImageUpload} className="hidden" />
                </label>
                {bgImage && (
                  <button onClick={() => {setBgImage(''); setShowBgSettings(false)}} className="w-full mt-3 py-2 bg-red-950/50 text-red-400 rounded-lg text-sm font-bold border border-red-900 hover:bg-red-900/50">
                    清除背景
                  </button>
                )}
              </div>
            )}
          </div>

          {/* 文章主体内容区 */}
          <div className="relative z-10 pt-24 pb-20 px-4">
            <div className="max-w-4xl mx-auto reader-glass rounded-2xl p-6 md:p-12 shadow-2xl">
              
              {/* 题头信息 */}
              <div className="border-b border-slate-700/60 pb-8 mb-8">
                <div className="flex items-center gap-3 mb-4">
                  <span className="px-3 py-1 bg-cyan-950 text-cyan-400 font-mono font-bold text-sm rounded border border-cyan-800">
                    {problem.platform}
                  </span>
                  <span className={`px-3 py-1 rounded font-black text-sm border ${
                    problem.difficulty === '困难' ? 'bg-red-950/50 text-red-400 border-red-800' :
                    problem.difficulty === '中等' ? 'bg-orange-950/50 text-orange-400 border-orange-800' :
                    'bg-green-950/50 text-green-400 border-green-800'
                  }`}>
                    {problem.difficulty}
                  </span>
                  <span className="text-slate-500 font-mono text-sm ml-auto">{problem.date}</span>
                </div>
                <h1 className="text-3xl md:text-5xl font-black text-white leading-tight mb-4">
                  {problem.title}
                </h1>
                <div className="flex flex-wrap gap-2">
                  {problem.tags && problem.tags.map((tag, idx) => (
                    <span key={idx} className="text-xs px-2 py-1 bg-slate-800/80 text-slate-300 rounded border border-slate-600 flex items-center gap-1">
                      <Tag size={12}/> {tag}
                    </span>
                  ))}
                </div>
              </div>

              {/* Markdown 正文渲染 */}
              <div 
                ref={contentRef}
                className="prose prose-invert prose-cyan max-w-none prose-lg"
                dangerouslySetInnerHTML={{ __html: marked.parse(problem.markdown || '> *此题目暂未记录详细题解。*') }}
              />
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 主应用程序 (调度器)
    // ==========================================
    const App = () => {
      // 视图控制：'home' = 主控制台, 'viewer' = 题解阅读舱
      const [view, setView] = useState('home');
      const [viewingProblem, setViewingProblem] = useState(null);

      const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      // --- 数据持久化 ---
      const [problems, setProblems] = useState(() => {
        const savedData = localStorage.getItem('acmer_data_v4');
        return savedData ? JSON.parse(savedData) : [];
      });

      // 阅读舱专属背景
      const [readerBg, setReaderBg] = useState(() => localStorage.getItem('acmer_reader_bg') || '');

      useEffect(() => { localStorage.setItem('acmer_data_v4', JSON.stringify(problems)); }, [problems]);
      useEffect(() => { localStorage.setItem('acmer_reader_bg', readerBg); }, [readerBg]);

      // --- 表单状态 ---
      const [newPlatform, setNewPlatform] = useState('Codeforces');
      const [newTitle, setNewTitle] = useState('');
      const [newDifficulty, setNewDifficulty] = useState('中等');
      const [newTags, setNewTags] = useState('');
      const [markdownContent, setMarkdownContent] = useState('');
      const [searchQuery, setSearchQuery] = useState('');

      const todayCount = problems.filter(p => p.date === getTodayStr()).length;
      const isGodMode = todayCount >= 5; 

      // 录入新题
      const handleAddProblem = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;

        const newProblem = {
          id: Date.now(),
          title: newTitle,
          platform: newPlatform,
          date: getTodayStr(),
          difficulty: newDifficulty,
          tags: newTags.split(',').map(t => t.trim()).filter(t => t !== ''),
          markdown: markdownContent 
        };

        setProblems([newProblem, ...problems]);
        setNewTitle(''); setNewTags(''); setMarkdownContent('');
      };

      // 删除记录
      const handleDeleteProblem = (id) => {
        if (window.confirm('警告：确认要永久删除这条战绩记录吗？')) {
          setProblems(problems.filter(p => p.id !== id));
        }
      };

      // 读取本地 MD 文件填入表单
      const handleMdFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => setMarkdownContent(event.target.result);
        reader.readAsText(file);
      };

      // 进入阅读舱
      const openReader = (problem) => {
        setViewingProblem(problem);
        setView('viewer');
        window.scrollTo(0, 0);
      };

      // --- 游戏评级 ---
      const getStatusEffect = (count) => {
        if (count === 0) return { label: '系统休眠 (SLEEPING)', color: 'text-slate-500', border: 'border-slate-800' };
        if (count <= 2) return { label: '引擎点火 (WARMING UP)', color: 'text-cyan-400', border: 'border-cyan-500/50 shadow-[0_0_20px_rgba(6,182,212,0.3)]' };
        if (count <= 4) return { label: '火力全开 (UNSTOPPABLE)', color: 'text-blue-400', border: 'border-blue-400/80 shadow-[0_0_40px_rgba(59,130,246,0.6)]' };
        return { label: '超神时刻 (GOD MODE!)', color: 'text-red-500 font-black tracking-widest', border: 'animate-hyper-glow' };
      };
      const currentStatus = getStatusEffect(todayCount);

      const filteredProblems = problems.filter(p => {
        const query = searchQuery.toLowerCase();
        const tagMatch = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
        return p.title.toLowerCase().includes(query) || p.platform.toLowerCase().includes(query) || tagMatch;
      });

      // ==========================================
      // 视图渲染分支
      // ==========================================
      if (view === 'viewer' && viewingProblem) {
        return <MarkdownViewer problem={viewingProblem} onBack={() => setView('home')} bgImage={readerBg} setBgImage={setReaderBg} />;
      }

      // 主控制台视图
      return (
        <div className="min-h-screen relative font-sans">
          
          {/* 超神状态专属：彩色动态流光遮罩 */}
          {isGodMode && <div className="fixed inset-0 z-0 pointer-events-none colorful-overlay mix-blend-screen" />}
          
          {/* 炫酷彩色霓虹粒子网 */}
          <NeonPlexusBackground isGodMode={isGodMode} />

          {/* 主体 UI */}
          <div className="max-w-7xl mx-auto space-y-6 relative z-10 p-4 md:p-8">
            
            {/* 顶栏 */}
            <header className="flex items-center justify-between glass-panel p-5 rounded-2xl border-t border-t-slate-600">
              <div className="flex items-center gap-4">
                <div className={`p-3 rounded-xl ${isGodMode ? 'bg-red-600 shadow-[0_0_30px_#ef4444]' : 'bg-cyan-600 shadow-[0_0_20px_rgba(6,182,212,0.5)]'}`}>
                  <TerminalSquare className="text-white w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-2xl md:text-3xl font-black text-white tracking-wider">
                    ACMer <span className={isGodMode ? 'text-red-500' : 'text-cyan-400'}>NEXUS</span>
                  </h1>
                  <p className="text-slate-400 text-xs font-mono tracking-widest mt-1">MAIN_DASHBOARD // ONLINE</p>
                </div>
              </div>
              <div className="text-right hidden md:block">
                <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">历史总 AC</p>
                <p className="text-4xl font-black text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.8)]">
                  {problems.length}
                </p>
              </div>
            </header>

            {/* 超级状态大屏 */}
            <section className={`glass-panel rounded-2xl p-6 md:p-10 transition-all duration-500 border-2 ${currentStatus.border}`}>
              <div className="flex flex-col md:flex-row items-center justify-between gap-8">
                <div className="flex items-center gap-6">
                  <div className={`p-6 rounded-2xl bg-black/50 border ${isGodMode ? 'border-red-500 shadow-[0_0_50px_#ef4444]' : 'border-slate-700'}`}>
                    {isGodMode ? <Flame size={70} className="text-red-500 animate-pulse" /> : <Trophy size={70} className={currentStatus.color} />}
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-500 mb-2 tracking-widest uppercase">Current Status</p>
                    <h2 className={`text-4xl md:text-6xl tracking-tighter ${currentStatus.color}`} style={{ textShadow: isGodMode ? '0 0 40px #ef4444' : 'none' }}>
                      {currentStatus.label}
                    </h2>
                    <p className="text-slate-300 mt-4 text-xl font-medium">
                      今日战绩：<span className="text-5xl font-black mx-3 text-white drop-shadow-lg">{todayCount}</span> 题
                    </p>
                  </div>
                </div>
                
                {/* 赛博能量槽 */}
                <div className="w-full md:w-96 bg-black rounded-full h-8 overflow-hidden border-2 border-slate-700 relative shadow-[inset_0_0_20px_rgba(0,0,0,1)]">
                  <div 
                    className={`h-full transition-all duration-1000 relative ${isGodMode ? 'bg-gradient-to-r from-red-800 via-red-500 to-yellow-400' : 'bg-gradient-to-r from-cyan-800 via-cyan-400 to-blue-400'}`}
                    style={{ width: `${Math.min((todayCount / 5) * 100, 100)}%` }}
                  >
                    <div className="absolute top-0 left-0 right-0 h-1/2 bg-white/40 rounded-t-full"></div>
                  </div>
                  <div className="absolute inset-0 flex items-center justify-end pr-5 font-black text-sm text-white mix-blend-overlay tracking-widest">
                    TARGET: 5
                  </div>
                </div>
              </div>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 左侧：列表 */}
              <div className="lg:col-span-2 glass-panel rounded-2xl flex flex-col border-t-4 border-t-cyan-500" style={{ maxHeight: '800px' }}>
                <div className="p-6 border-b border-slate-700/80 bg-black/40 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <h3 className="font-black text-white flex items-center gap-3 text-xl tracking-wide">
                    <CheckCircle2 size={26} className="text-cyan-400" />
                    战绩归档系统
                  </h3>
                  <div className="relative w-full sm:w-80">
                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500 w-5 h-5" />
                    <input 
                      type="text" 
                      placeholder="检索题目、平台、标签..." 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-12 pr-4 py-3 bg-black/60 border border-slate-700 rounded-xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all outline-none text-slate-100 font-bold"
                    />
                  </div>
                </div>
                
                <div className="divide-y divide-slate-800/80 overflow-y-auto flex-1 p-3 space-y-2">
                  {filteredProblems.map(problem => (
                    <div key={problem.id} className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-5 bg-slate-900/40 hover:bg-slate-800/60 rounded-xl border border-slate-700/50 hover:border-cyan-500/50 transition-all group">
                      
                      <div className="flex items-center gap-5">
                        <div className="text-cyan-400 border border-cyan-800 bg-cyan-950/30 font-black font-mono px-3 py-1.5 rounded text-sm shadow-[inset_0_0_10px_rgba(6,182,212,0.2)]">
                          {problem.platform}
                        </div>
                        <div className="flex flex-col gap-1">
                          <span className="font-black text-slate-100 text-xl group-hover:text-cyan-300 transition-colors">
                            {problem.title}
                          </span>
                          <div className="flex gap-2">
                            {problem.tags && problem.tags.slice(0,3).map((tag, idx) => (
                              <span key={idx} className="text-xs text-slate-500 font-mono">#{tag}</span>
                            ))}
                          </div>
                        </div>
                      </div>

                      <div className="flex items-center gap-3 shrink-0 mt-2 sm:mt-0">
                        <span className={`text-sm px-4 py-1.5 rounded-lg font-black border ${
                          problem.difficulty === '困难' ? 'bg-red-950/30 text-red-400 border-red-800/50' :
                          problem.difficulty === '中等' ? 'bg-orange-950/30 text-orange-400 border-orange-800/50' :
                          'bg-green-950/30 text-green-400 border-green-800/50'
                        }`}>
                          {problem.difficulty}
                        </span>
                        
                        <button 
                          onClick={() => openReader(problem)}
                          className="flex items-center gap-2 px-5 py-2.5 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-all shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] active:scale-95"
                        >
                          <FileText size={18} />
                          {problem.markdown ? '查看题解' : '详情'}
                        </button>

                        {/* 删除记录按钮 */}
                        <button 
                          onClick={() => handleDeleteProblem(problem.id)}
                          className="flex items-center justify-center p-2.5 bg-red-950/30 hover:bg-red-600 text-red-500 hover:text-white font-bold rounded-lg transition-all border border-red-900/50 hover:shadow-[0_0_15px_rgba(239,68,68,0.4)] active:scale-95"
                          title="删除该记录"
                        >
                          <Trash2 size={18} />
                        </button>
                      </div>

                    </div>
                  ))}
                  {filteredProblems.length === 0 && (
                    <div className="p-20 text-center text-slate-500 font-black text-2xl flex flex-col items-center gap-6">
                      <Swords size={80} className="text-slate-700 opacity-40" />
                      无可匹配数据 // SYSTEM_EMPTY
                    </div>
                  )}
                </div>
              </div>

              {/* 右侧：硬核录入表单 */}
              <div className="glass-panel rounded-2xl p-6 md:p-8 border-t-4 border-t-blue-500 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
                <h3 className="text-2xl font-black text-white mb-8 flex items-center gap-3">
                  <Plus size={28} className="text-blue-400" />
                  执行新 AC 录入
                </h3>
                
                <form onSubmit={handleAddProblem} className="space-y-6">
                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-2 font-mono uppercase">Platform // 平台</label>
                    <select value={newPlatform} onChange={(e) => setNewPlatform(e.target.value)} className="w-full bg-black border border-slate-700 text-slate-100 rounded-lg px-4 py-3.5 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-bold">
                      <option>Codeforces</option>
                      <option>AtCoder</option>
                      <option>LeetCode</option>
                      <option>洛谷 (Luogu)</option>
                      <option>HDU / POJ</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-2 font-mono uppercase">Problem // 题目</label>
                    <input type="text" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} placeholder="e.g. A. Watermelon" className="w-full bg-black border border-slate-700 text-slate-100 rounded-lg px-4 py-3.5 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-bold text-lg" />
                  </div>

                  <div className="p-5 bg-slate-900/80 rounded-xl border border-slate-700/80">
                    <label className="flex items-center justify-between text-xs font-bold text-cyan-400 mb-3 font-mono">
                      <span className="flex items-center gap-2"><FileText size={16}/> MD_CONTENT</span>
                      <label className="cursor-pointer bg-cyan-950/50 text-cyan-300 px-3 py-1.5 rounded border border-cyan-800 hover:bg-cyan-900 transition-colors flex items-center gap-1">
                        <Upload size={14}/> 本地导入 .md
                        <input type="file" accept=".md,.txt" onChange={handleMdFileUpload} className="hidden" />
                      </label>
                    </label>
                    <textarea 
                      value={markdownContent} onChange={(e) => setMarkdownContent(e.target.value)}
                      placeholder="完美支持 Markdown、$$LaTeX 数学公式$$、以及 ```cpp 代码块高亮！写入你的硬核题解吧..."
                      rows="6"
                      className="w-full bg-black border border-slate-800 text-slate-300 rounded-lg px-4 py-3 focus:border-cyan-500 transition-all font-mono text-sm"
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-2 font-mono uppercase">Tags // 标签</label>
                    <input type="text" value={newTags} onChange={(e) => setNewTags(e.target.value)} placeholder="DP, 图论, 数学..." className="w-full bg-black border border-slate-700 text-slate-100 rounded-lg px-4 py-3 focus:border-blue-500 transition-all font-bold" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-3 font-mono uppercase">Difficulty // 难度</label>
                    <div className="grid grid-cols-3 gap-3">
                      {['简单', '中等', '困难'].map(diff => (
                        <button key={diff} type="button" onClick={() => setNewDifficulty(diff)}
                          className={`py-3 text-sm rounded-lg border-2 font-black transition-all ${
                            newDifficulty === diff 
                              ? (diff === '简单' ? 'bg-green-900/30 border-green-500 text-green-400' :
                                 diff === '中等' ? 'bg-orange-900/30 border-orange-500 text-orange-400' :
                                 'bg-red-900/30 border-red-500 text-red-400')
                              : 'bg-black border-slate-800 text-slate-600 hover:border-slate-600'
                          }`}
                        >{diff}</button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" disabled={!newTitle.trim()}
                    className="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl py-4.5 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(59,130,246,0.4)] text-xl"
                  >
                    <Swords size={24} /> 确认写入战绩
                  </button>
                </form>
              </div>

            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
