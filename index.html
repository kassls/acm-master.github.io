<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMer 核心控制台 - 视界极客版 v8.0</title>
  
  <!-- 稳定 CDN 节点，防国内屏蔽 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Markdown 与高亮引擎 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/cpp.min.js"></script>

  <!-- 数学公式引擎 -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      startup: { typeset: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&family=Fira+Code:wght@400;600&display=swap');

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.4); }
    ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.6); border-radius: 0px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(217, 70, 239, 1); }
    .font-sci-fi { font-family: 'Rajdhani', sans-serif; }

    /* === 破茧爆发爆闪 === */
    @keyframes screen-flash {
      0% { opacity: 1; background: #ffffff; }
      10% { opacity: 0.8; background: #d946ef; } 
      100% { opacity: 0; background: transparent; }
    }
    @keyframes shockwave-expand {
      0% { transform: scale(0); opacity: 1; border-width: 60px; border-color: rgba(217, 70, 239, 1); }
      100% { transform: scale(15); opacity: 0; border-width: 0px; border-color: rgba(6, 182, 212, 0.5); }
    }
    .animate-flash { animation: screen-flash 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-shockwave {
      position: fixed; top: 50%; left: 50%;
      width: 20vw; height: 20vw; margin-top: -10vw; margin-left: -10vw;
      border: 0px solid transparent; border-radius: 50%; pointer-events: none; z-index: 9999;
      animation: shockwave-expand 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    /* === 极致通透毛玻璃 HUD 面板 === */
    .hud-panel {
      background: rgba(8, 12, 20, 0.2); 
      backdrop-filter: blur(16px) saturate(120%);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      border: 1px solid rgba(6, 182, 212, 0.2);
      position: relative;
    }
    .hud-clip { clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)); }
    .hud-clip-ascended {
      border-color: rgba(217, 70, 239, 0.5);
      box-shadow: 0 0 30px rgba(217, 70, 239, 0.15) inset;
    }

    .hud-inner-glass {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* === 深度美化 Select Dropdown === */
    .cyber-select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2306b6d4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 1.2em;
    }
    .cyber-select option {
      background-color: #0b1120;
      color: #e2e8f0;
      font-family: 'Rajdhani', sans-serif;
      font-weight: bold;
    }

    /* === 能量槽动态流光 === */
    @keyframes progress-stripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 0; }
    }
    @keyframes gradient-flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .energy-bar-stripes {
      background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent);
      background-size: 40px 40px;
      animation: progress-stripes 1s linear infinite;
    }
    .bg-ascended-flow {
      background: linear-gradient(90deg, #d946ef, #8b5cf6, #06b6d4, #f59e0b, #d946ef);
      background-size: 300% 100%;
      animation: gradient-flow 3s ease infinite;
    }

    .scanlines {
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px; position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
    }

    .reader-glass {
      background: rgba(10, 15, 25, 0.3);
      backdrop-filter: blur(25px) saturate(150%);
      -webkit-backdrop-filter: blur(25px) saturate(150%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    /* === Markdown 极客渲染体系 (绝对稳定且融合毛玻璃) === */
    .md-prose { color: #e2e8f0; font-size: 1.05rem; line-height: 1.8; word-break: break-word; }
    .md-prose h1, .md-prose h2, .md-prose h3 { color: #ffffff; font-family: 'Rajdhani', sans-serif; font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; letter-spacing: 0.5px; }
    .md-prose h1 { font-size: 2.25rem; border-bottom: 2px solid rgba(6, 182, 212, 0.4); padding-bottom: 0.3em; }
    .md-prose h2 { font-size: 1.75rem; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 0.3em; }
    .md-prose h3 { font-size: 1.35rem; color: #67e8f9; }
    .md-prose p, .md-prose li { margin-bottom: 1em; color: #cbd5e1; }
    .md-prose ul { list-style-type: disc; padding-left: 1.5em; }
    .md-prose ol { list-style-type: decimal; padding-left: 1.5em; }
    
    /* 独立短代码高亮 */
    .md-prose code:not(pre code) { 
      font-family: 'Fira Code', monospace; background: rgba(217, 70, 239, 0.15); color: #f472b6; 
      padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; 
    }
    
    /* 代码块父容器赋予毛玻璃 */
    .md-prose pre { 
      background: rgba(15, 20, 30, 0.6) !important; 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(6, 182, 212, 0.25);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
      padding: 1.2em !important; 
      border-radius: 8px; 
      overflow-x: auto; 
      margin: 1.5em 0; 
    }
    
    /* 允许 Highlight.js 的原色不受干扰地透出 */
    .md-prose pre code { 
      background: transparent !important; 
      padding: 0 !important; 
      font-family: 'Fira Code', monospace; 
      font-size: 0.9em; 
    }
    
    .md-prose blockquote { 
      border-left: 4px solid #06b6d4; background: linear-gradient(90deg, rgba(6,182,212,0.15) 0%, transparent 100%);
      padding: 1em 1.5em; margin: 1.5em 0; color: #94a3b8; font-style: italic; border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body class="bg-[#030305] text-slate-200 overflow-x-hidden selection:bg-fuchsia-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Flame, CheckCircle2, Swords, Search, Tag, ImageIcon,
      Plus, FileText, Upload, ArrowLeft, TerminalSquare, Trash2, Target, Zap, Clock
    } from 'https://esm.sh/lucide-react@0.263.1';

    // 核心修复：安全配置 Marked，绝不在解析期进行高亮挂载，防止崩溃！
    if (typeof window.marked !== 'undefined') {
      window.marked.setOptions({
        breaks: true,
        gfm: true
      });
    }

    // ==========================================
    // 终极 VFX 引擎：无垠螺旋星云 & 真实电影级黑洞
    // ==========================================
    const VfxEngine = ({ isGodMode, burstTrigger }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d', { alpha: false });
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        let animationId;
        let time = 0;
        let burstMultiplier = 1;

        // ----------------------------------------------------
        // 模式 A：永恒螺旋星系 (< 10 题)
        // 绝不消失、纯粹平滑旋转的阿基米德旋臂
        // ----------------------------------------------------
        const arms = 3;
        const galaxyStars = Array.from({ length: 5000 }, () => {
          const armIndex = Math.floor(Math.random() * arms);
          const armAngle = (armIndex * 2 * Math.PI) / arms;
          const radius = Math.random() * w; // 分布在整个屏幕
          const spiralOffset = radius * 0.004; // 越远越弯曲
          const scatter = (Math.random() - 0.5) * (80 + radius * 0.15); // 星云的厚度

          return {
            r: radius,
            angle: armAngle + spiralOffset,
            scatterX: Math.cos(armAngle) * scatter,
            scatterY: Math.sin(armAngle) * scatter,
            size: Math.random() * 1.5 + 0.5,
            speed: 0.001 + 0.003 / (1 + radius * 0.005), // 开普勒式速度：内快外慢
            hue: 190 + radius * 0.05 // 中心偏青，外围偏紫
          };
        });

        // ----------------------------------------------------
        // 星空背景 (仅在黑洞模式下被引力透镜扭曲)
        // ----------------------------------------------------
        const bgStars = Array.from({ length: 800 }, () => ({
          x: (Math.random() - 0.5) * w * 2,
          y: (Math.random() - 0.5) * h * 2,
          size: Math.random() * 1.5 + 0.5,
          alpha: Math.random() * 0.8 + 0.2
        }));

        const animate = () => {
          time++;
          if (burstMultiplier > 1) burstMultiplier *= 0.95;
          const cx = w / 2; const cy = h / 2;

          if (isGodMode) {
            // ==========================================
            // 渲染：Gargantua 真实电影级黑洞 (无粒子，全图形学)
            // ==========================================
            // 60% 屏幕宽度的震撼视界
            const bhRadius = Math.min(w, h) * 0.30; 

            ctx.fillStyle = `rgba(1, 2, 5, 1)`; // 漆黑宇宙背景
            ctx.fillRect(0, 0, w, h);

            // 1. 渲染背景星辰 (并在黑洞周围产生引力透镜偏折)
            ctx.globalCompositeOperation = 'lighter';
            bgStars.forEach(s => {
               let dx = s.x - cx; let dy = s.y - cy;
               let dist = Math.sqrt(dx*dx + dy*dy);
               let drawX = cx + dx; let drawY = cy + dy;

               if (dist > bhRadius && dist < bhRadius * 4) {
                   // 引力透镜方程：光线弯折放大
                   let deflect = (bhRadius * bhRadius) / (dist * 1.2);
                   drawX += (dx / dist) * deflect;
                   drawY += (dy / dist) * deflect;
                   ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                   ctx.fillRect(drawX, drawY, s.size, s.size);
               } else if (dist >= bhRadius * 4) {
                   ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                   ctx.fillRect(drawX, drawY, s.size, s.size);
               }
               // 星空整体极其缓慢的自转
               let angle = Math.atan2(dy, dx) + 0.0002;
               s.x = cx + Math.cos(angle) * dist;
               s.y = cy + Math.sin(angle) * dist;
            });

            ctx.save();
            ctx.translate(cx, cy);
            
            // 整体黑洞体系微微转动，增加生命力
            ctx.rotate(Math.sin(time * 0.002) * 0.03);

            // 2. 引力透镜顶部光环 (Top Lensed Halo)
            const topGradient = ctx.createRadialGradient(0, -bhRadius*0.1, bhRadius*0.8, 0, -bhRadius, bhRadius*2.2);
            topGradient.addColorStop(0, 'rgba(255, 200, 100, 0)');
            topGradient.addColorStop(0.3, 'rgba(255, 230, 150, 0.8)');
            topGradient.addColorStop(0.6, 'rgba(200, 100, 50, 0.4)');
            topGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.beginPath();
            ctx.ellipse(0, 0, bhRadius * 1.35, bhRadius * 1.35, 0, Math.PI, 0); 
            ctx.lineWidth = bhRadius * 0.4;
            ctx.strokeStyle = topGradient;
            ctx.stroke();

            // 3. 引力透镜底部光环 (Bottom Lensed Halo)
            const botGradient = ctx.createRadialGradient(0, bhRadius*0.1, bhRadius*0.8, 0, bhRadius, bhRadius*2.2);
            botGradient.addColorStop(0, 'rgba(255, 200, 100, 0)');
            botGradient.addColorStop(0.3, 'rgba(255, 200, 120, 0.5)');
            botGradient.addColorStop(0.6, 'rgba(150, 60, 20, 0.2)');
            botGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.beginPath();
            ctx.ellipse(0, 0, bhRadius * 1.25, bhRadius * 1.25, 0, 0, Math.PI); 
            ctx.lineWidth = bhRadius * 0.3;
            ctx.strokeStyle = botGradient;
            ctx.stroke();

            // 4. 光子环 (Photon Ring) - 黑洞事件视界边缘的极致亮光
            ctx.globalCompositeOperation = 'screen';
            ctx.beginPath();
            ctx.arc(0, 0, bhRadius + 1, 0, Math.PI * 2);
            ctx.lineWidth = 5;
            ctx.strokeStyle = 'rgba(255, 255, 200, 0.9)';
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255, 180, 50, 1)';
            ctx.stroke();
            ctx.shadowBlur = 0; // 重置阴影

            // 5. 事件视界 (Event Horizon) - 绝对的深渊
            ctx.globalCompositeOperation = 'source-over';
            ctx.beginPath();
            ctx.arc(0, 0, bhRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            // 6. 前景吸积盘 (Accretion Disk) - 贯穿黑洞的高能明亮物质盘
            ctx.globalCompositeOperation = 'screen';
            const diskWidth = w * 0.75; // 极宽，延展到屏幕边缘
            const diskHeight = bhRadius * 0.12; // 极扁平

            const diskGradient = ctx.createRadialGradient(0, 0, bhRadius * 0.5, 0, 0, diskWidth);
            diskGradient.addColorStop(0, 'rgba(255, 255, 255, 1)');      // 核心极致白光
            diskGradient.addColorStop(0.2, 'rgba(255, 220, 150, 0.9)');  // 炽热黄光
            diskGradient.addColorStop(0.5, 'rgba(200, 80, 20, 0.7)');    // 高温红橙
            diskGradient.addColorStop(0.8, 'rgba(50, 10, 20, 0.3)');     // 暗弱星尘
            diskGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');            // 消散

            ctx.beginPath();
            ctx.ellipse(0, 0, diskWidth, diskHeight, 0, 0, Math.PI * 2);
            ctx.fillStyle = diskGradient;
            ctx.fill();

            // 7. 吸积盘的核心极亮光带
            ctx.beginPath();
            ctx.ellipse(0, 0, diskWidth * 0.7, diskHeight * 0.3, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(255, 200, 100, 1)';
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();

          } else {
            // ==========================================
            // 渲染：永恒螺旋星系
            // ==========================================
            // 极长残影清理
            ctx.fillStyle = `rgba(3, 5, 10, ${0.1 / burstMultiplier})`; 
            ctx.fillRect(0, 0, w, h);
            ctx.globalCompositeOperation = 'lighter';
            
            galaxyStars.forEach(p => {
              p.angle += p.speed; // 永不停止的旋臂运动
              
              // 结合轨道的固定半径和旋臂的散射度，计算完美坐标
              const x = cx + Math.cos(p.angle) * p.r + p.scatterX;
              // 稍微倾斜视角，让星系呈扁平状
              const y = cy + Math.sin(p.angle) * p.r * 0.6 + p.scatterY; 
              
              ctx.fillStyle = `hsla(${p.hue}, 100%, 75%, 0.8)`;
              ctx.fillRect(x, y, p.size, p.size);
            });
          }

          ctx.globalCompositeOperation = 'source-over';
          animationId = requestAnimationFrame(animate);
        };

        animate();

        if (burstTrigger) burstMultiplier = 6;

        const handleResize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        window.addEventListener('resize', handleResize);
        return () => { cancelAnimationFrame(animationId); window.removeEventListener('resize', handleResize); };
      }, [isGodMode, burstTrigger]);

      return <canvas ref={canvasRef} className="fixed inset-0 z-0 pointer-events-none mix-blend-screen" />;
    };

    // ==========================================
    // 独立页面：Markdown 题解阅读舱
    // ==========================================
    const MarkdownViewer = ({ problem, onBack, bgImage, setBgImage }) => {
      const contentRef = useRef(null);
      const [showBgSettings, setShowBgSettings] = useState(false);

      useEffect(() => {
        // MD 内容注入 DOM 后，安全执行高亮渲染与公式排版！
        if (contentRef.current) {
          if (window.hljs) {
            contentRef.current.querySelectorAll('pre code').forEach((block) => {
              block.removeAttribute('data-highlighted'); // 清除旧状态
              window.hljs.highlightElement(block);       // 执行原生高亮
            });
          }
          if (window.MathJax && window.MathJax.typesetPromise) { 
            window.MathJax.typesetPromise([contentRef.current]).catch(console.error); 
          }
        }
      }, [problem]);

      const handleBgImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            let w = img.width; let h = img.height;
            if (w > h && w > 1920) { h *= 1920/w; w = 1920; } else if (h > 1080) { w *= 1080/h; h = 1080; }
            canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
            setBgImage(canvas.toDataURL('image/jpeg', 0.8)); setShowBgSettings(false);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      // 绝对稳健的 Markdown 到 HTML 转换
      const getMarkdownHtml = () => {
        if (!problem || !problem.markdown) return '<p class="text-slate-500 font-mono">> *无记录数据*</p>';
        try {
          if (typeof window.marked !== 'undefined') {
            return window.marked.parse(problem.markdown);
          }
        } catch (error) {
          console.error('Markdown 引擎执行失败:', error);
        }
        // 如果引擎崩溃，安全回退到纯文本模式，保证不白屏
        return `<pre style="white-space: pre-wrap; font-family: monospace;">${problem.markdown}</pre>`;
      };

      return (
        <div className="min-h-screen relative font-sans animate-[fadeIn_0.3s_ease-out]">
          {bgImage ? (
            <div className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat bg-fixed opacity-70" style={{ backgroundImage: `url(${bgImage})` }} />
          ) : ( <div className="fixed inset-0 z-0 bg-[#08080c]" /> )}

          <div className="fixed top-0 left-0 right-0 z-50 reader-glass border-b border-cyan-500/30">
            <div className="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
              <button onClick={onBack} className="flex items-center gap-2 text-cyan-400 hover:text-cyan-300 font-sci-fi font-bold px-4 py-2 bg-cyan-950/50 rounded-none border-l-4 border-cyan-500 transition-all hover:pr-6">
                <ArrowLeft size={18} /> 撤离舱室 / BACK
              </button>
              <div className="flex items-center gap-4">
                <button onClick={() => setShowBgSettings(!showBgSettings)} className="p-2 text-slate-300 hover:text-cyan-400 bg-black/50 border border-slate-600 transition-all">
                  <ImageIcon size={20} />
                </button>
              </div>
            </div>
            
            {showBgSettings && (
              <div className="absolute top-16 right-4 mt-2 p-4 bg-slate-900 border border-cyan-500 rounded-none shadow-2xl w-80">
                <label className="block text-sm font-sci-fi font-bold text-cyan-400 mb-3 uppercase">WallPaper Settings</label>
                <label className="cursor-pointer flex flex-col items-center justify-center gap-2 w-full py-6 border-2 border-dashed border-cyan-500/40 hover:bg-cyan-900/30 transition-all text-slate-300">
                  <Upload size={24} className="text-cyan-400"/> 
                  <span className="font-bold text-sm">导入沉浸背景图</span>
                  <input type="file" accept="image/*" onChange={handleBgImageUpload} className="hidden" />
                </label>
                {bgImage && (
                  <button onClick={() => {setBgImage(''); setShowBgSettings(false)}} className="w-full mt-3 py-2 bg-red-950/50 text-red-400 font-bold border border-red-900 hover:bg-red-900/80">清除背景</button>
                )}
              </div>
            )}
          </div>

          <div className="relative z-10 pt-28 pb-20 px-4 md:px-8">
            <div className="max-w-4xl mx-auto reader-glass p-6 md:p-12 shadow-2xl hud-clip border-t-4 border-cyan-500">
              <div className="border-b border-slate-700/60 pb-6 mb-8">
                <div className="flex items-center gap-3 mb-4 font-sci-fi">
                  <span className="px-3 py-1 bg-cyan-950 text-cyan-400 font-bold text-sm border border-cyan-800">{problem.platform}</span>
                  <span className="text-slate-500 text-sm ml-auto tracking-widest flex items-center gap-1">
                    <Clock size={12}/> {problem.date} {problem.timestamp || ''}
                  </span>
                </div>
                <h1 className="text-3xl md:text-5xl font-sci-fi font-black text-white leading-tight mb-4 tracking-wide">{problem.title}</h1>
                <div className="flex flex-wrap gap-2">
                  {problem.tags && problem.tags.map((tag, idx) => (
                    <span key={idx} className="text-xs px-2 py-1 bg-black/60 text-slate-300 border border-slate-700 flex items-center gap-1 font-mono"><Tag size={12}/> {tag}</span>
                  ))}
                </div>
              </div>
              <div 
                ref={contentRef}
                className="md-prose"
                dangerouslySetInnerHTML={{ __html: getMarkdownHtml() }}
              />
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 主应用程序
    // ==========================================
    const App = () => {
      const [view, setView] = useState('home');
      const [viewingProblem, setViewingProblem] = useState(null);

      const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const getCurrentTimeStr = () => {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
      };

      const [problems, setProblems] = useState(() => {
        try {
          const savedData = localStorage.getItem('acmer_data_v7');
          return savedData ? JSON.parse(savedData) : [];
        } catch (e) {
          return [];
        }
      });
      const [readerBg, setReaderBg] = useState(() => localStorage.getItem('acmer_reader_bg') || '');

      useEffect(() => { localStorage.setItem('acmer_data_v7', JSON.stringify(problems)); }, [problems]);
      useEffect(() => { localStorage.setItem('acmer_reader_bg', readerBg); }, [readerBg]);

      const [newPlatform, setNewPlatform] = useState('Codeforces');
      const [newTitle, setNewTitle] = useState('');
      const [newDifficulty, setNewDifficulty] = useState('中等');
      const [newTags, setNewTags] = useState('');
      const [markdownContent, setMarkdownContent] = useState('');
      const [searchQuery, setSearchQuery] = useState('');

      const todayCount = problems.filter(p => p.date === getTodayStr()).length;
      
      const [isGodMode, setIsGodMode] = useState(todayCount >= 10);
      const [flashEffect, setFlashEffect] = useState(false);
      const prevCountRef = useRef(todayCount);

      useEffect(() => {
        setIsGodMode(todayCount >= 10);
        if (prevCountRef.current < 10 && todayCount >= 10) {
          setFlashEffect(true);
          setTimeout(() => setFlashEffect(false), 1500);
        }
        prevCountRef.current = todayCount;
      }, [todayCount]);

      const handleAddProblem = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;
        const newProblem = {
          id: Date.now(), 
          title: newTitle, 
          platform: newPlatform,
          date: getTodayStr(), 
          timestamp: getCurrentTimeStr(),
          difficulty: newDifficulty,
          tags: newTags.split(',').map(t => t.trim()).filter(t => t !== ''),
          markdown: markdownContent 
        };
        setProblems([newProblem, ...problems]);
        setNewTitle(''); setNewTags(''); setMarkdownContent('');
      };

      const handleDeleteProblem = (id) => {
        if (window.confirm('警告：数据删除后无法恢复，确认抹除该记录？')) {
          setProblems(problems.filter(p => p.id !== id));
        }
      };

      const handleMdFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => setMarkdownContent(event.target.result);
        reader.readAsText(file);
      };

      const openReader = (problem) => { setViewingProblem(problem); setView('viewer'); window.scrollTo(0, 0); };

      const getStatusEffect = (count) => {
        if (count === 0) return { label: 'SYSTEM SLEEPING', color: 'text-slate-500', glow: '' };
        if (count <= 3) return { label: 'ENGINE IGNITION', color: 'text-cyan-400', glow: 'shadow-[0_0_30px_rgba(6,182,212,0.15)]' };
        if (count <= 9) return { label: 'UNSTOPPABLE', color: 'text-blue-400', glow: 'shadow-[0_0_40px_rgba(59,130,246,0.3)]' };
        return { 
          label: 'EVENT HORIZON // 视界飞升', 
          color: 'text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 via-cyan-400 to-yellow-400 animate-pulse font-black', 
          glow: 'hud-clip-ascended' 
        };
      };
      const currentStatus = getStatusEffect(todayCount);

      const filteredProblems = problems.filter(p => {
        const query = searchQuery.toLowerCase();
        const tagMatch = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
        return p.title.toLowerCase().includes(query) || p.platform.toLowerCase().includes(query) || tagMatch;
      });

      if (view === 'viewer' && viewingProblem) {
        return <MarkdownViewer problem={viewingProblem} onBack={() => setView('home')} bgImage={readerBg} setBgImage={setReaderBg} />;
      }

      return (
        <div className="min-h-screen relative font-sans">
          
          {flashEffect && (
            <div className="fixed inset-0 z-50 pointer-events-none animate-flash mix-blend-overlay flex items-center justify-center">
               <div className="animate-shockwave"></div>
            </div>
          )}

          <VfxEngine isGodMode={isGodMode} burstTrigger={flashEffect} />

          <div className="max-w-7xl mx-auto space-y-8 relative z-10 p-4 md:p-8">
            
            <header className="flex items-center justify-between hud-panel p-5 hud-clip">
              <div className="scanlines"></div>
              <div className="flex items-center gap-4 relative z-10">
                <div className={`p-3 border ${isGodMode ? 'bg-fuchsia-950/50 border-fuchsia-500 text-fuchsia-400 shadow-[0_0_20px_#d946ef]' : 'bg-cyan-950/50 border-cyan-500 text-cyan-400'}`}>
                  <TerminalSquare size={28} />
                </div>
                <div>
                  <h1 className="text-2xl md:text-3xl font-sci-fi font-black text-white tracking-widest uppercase">
                    ACMer <span className={isGodMode ? 'text-fuchsia-400 drop-shadow-[0_0_10px_#d946ef]' : 'text-cyan-400'}>NEXUS</span>
                  </h1>
                  <p className="text-slate-500 text-xs font-mono tracking-widest mt-1">v8.0 // GARGANTUA_ENGINE</p>
                </div>
              </div>
              <div className="text-right hidden md:block relative z-10">
                <p className="text-xs text-slate-500 font-sci-fi font-bold uppercase tracking-widest">TOTAL AC</p>
                <p className="text-4xl font-sci-fi font-black text-white">{problems.length}</p>
              </div>
            </header>

            <section className={`hud-panel p-8 md:p-10 hud-clip ${currentStatus.glow} transition-all duration-700`}>
              <div className="scanlines"></div>
              <div className="flex flex-col md:flex-row items-center justify-between gap-8 relative z-10">
                
                <div className="flex items-center gap-6 w-full md:w-auto">
                  <div className={`p-6 border-l-4 ${isGodMode ? 'bg-fuchsia-950/30 border-fuchsia-500 shadow-[0_0_40px_rgba(217,70,239,0.4)]' : 'hud-inner-glass border-slate-600'}`}>
                    {isGodMode ? <Flame size={60} className="text-fuchsia-500" /> : <Zap size={60} className={currentStatus.color} />}
                  </div>
                  <div>
                    <p className="text-xs font-mono text-slate-500 mb-1 tracking-widest uppercase flex items-center gap-2">
                      <Target size={14}/> Current Protocol
                    </p>
                    <h2 className={`text-4xl md:text-6xl font-sci-fi font-black tracking-wider ${currentStatus.color}`}>
                      {currentStatus.label}
                    </h2>
                    <p className="text-slate-400 mt-2 text-lg font-sci-fi font-bold tracking-widest uppercase">
                      TODAY AC: <span className="text-4xl text-white ml-2">{todayCount}</span>
                    </p>
                  </div>
                </div>
                
                <div className="w-full md:w-[400px] flex flex-col gap-2">
                  <div className="flex justify-between text-xs font-sci-fi font-bold tracking-widest text-slate-400 uppercase">
                    <span>Energy Power</span>
                    <span className={isGodMode ? 'text-fuchsia-400' : 'text-cyan-400'}>Target: 10</span>
                  </div>
                  <div className="w-full h-8 hud-inner-glass border border-slate-700 p-1" style={{ transform: 'skewX(-15deg)' }}>
                    <div 
                      className={`h-full transition-all duration-1000 ease-out energy-bar-stripes ${isGodMode ? 'bg-ascended-flow shadow-[0_0_25px_#d946ef]' : 'bg-gradient-to-r from-cyan-800 to-cyan-400 shadow-[0_0_15px_#06b6d4]'}`}
                      style={{ width: `${Math.min((todayCount / 10) * 100, 100)}%` }}
                    ></div>
                  </div>
                </div>

              </div>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              <div className="lg:col-span-2 hud-panel flex flex-col border-t-4 border-t-cyan-500" style={{ maxHeight: '800px' }}>
                <div className="scanlines"></div>
                <div className="p-6 border-b border-cyan-500/20 hud-inner-glass flex flex-col sm:flex-row sm:items-center justify-between gap-4 relative z-10">
                  <h3 className="font-sci-fi font-black text-white flex items-center gap-3 text-xl tracking-widest uppercase">
                    <CheckCircle2 size={24} className="text-cyan-400" />
                    Data Archive
                  </h3>
                  <div className="relative w-full sm:w-80">
                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-cyan-500 w-4 h-4" />
                    <input type="text" placeholder="检索 ID / 标签..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-12 pr-4 py-2.5 bg-black/40 border border-slate-700 text-slate-100 font-mono text-sm focus:border-cyan-500 outline-none backdrop-blur-sm transition-all" style={{ transform: 'skewX(-5deg)' }}
                    />
                  </div>
                </div>
                
                <div className="divide-y divide-slate-800/50 overflow-y-auto flex-1 p-4 space-y-3 relative z-10">
                  {filteredProblems.map(problem => (
                    <div key={problem.id} className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-4 hud-inner-glass hover:bg-cyan-500/10 border border-slate-700/30 hover:border-cyan-400/50 transition-all group">
                      
                      <div className="flex items-center gap-5 w-full sm:w-auto">
                        <div className="text-cyan-400 border border-cyan-800 bg-black/50 font-sci-fi font-bold px-3 py-1 text-sm tracking-widest uppercase shrink-0" style={{ transform: 'skewX(-10deg)' }}>
                          <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>{problem.platform}</span>
                        </div>
                        <div className="flex flex-col gap-1 w-full overflow-hidden">
                          <div className="flex items-center justify-between sm:justify-start gap-4">
                            <span className="font-bold text-slate-100 text-lg group-hover:text-cyan-400 transition-colors font-sci-fi tracking-wide truncate">
                              {problem.title}
                            </span>
                            <span className="text-xs font-mono text-slate-500 shrink-0 flex items-center gap-1">
                              <Clock size={10} className="hidden sm:inline-block"/> {problem.timestamp || ''}
                            </span>
                          </div>
                          <div className="flex gap-2">
                            {problem.tags && problem.tags.slice(0,3).map((tag, idx) => (
                              <span key={idx} className="text-xs text-cyan-500/80 font-mono">#{tag}</span>
                            ))}
                          </div>
                        </div>
                      </div>

                      <div className="flex items-center gap-3 shrink-0 mt-2 sm:mt-0">
                        <span className={`text-xs px-4 py-1.5 font-black uppercase tracking-widest border ${
                          problem.difficulty === '困难' ? 'bg-red-950/30 text-red-400 border-red-900/50' :
                          problem.difficulty === '中等' ? 'bg-orange-950/30 text-orange-400 border-orange-900/50' :
                          'bg-green-950/30 text-green-400 border-green-900/50'
                        }`} style={{ transform: 'skewX(-10deg)' }}>
                           <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>{problem.difficulty}</span>
                        </span>
                        
                        <button onClick={() => openReader(problem)}
                          className="flex items-center gap-2 px-4 py-2 bg-cyan-950/30 hover:bg-cyan-600/80 text-cyan-400 hover:text-white font-sci-fi font-bold border border-cyan-800/50 hover:border-cyan-400 transition-all uppercase tracking-widest text-sm"
                          style={{ transform: 'skewX(-10deg)' }}
                        >
                          <span className="flex items-center gap-1" style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>
                            <FileText size={14} className="inline mr-1"/>{problem.markdown ? 'READ_MD' : 'DETAIL'}
                          </span>
                        </button>

                        <button onClick={() => handleDeleteProblem(problem.id)} className="p-2 bg-red-950/20 hover:bg-red-600/80 text-red-500 hover:text-white transition-all border border-red-900/30" title="PURGE DATA">
                          <Trash2 size={16} />
                        </button>
                      </div>

                    </div>
                  ))}
                  {filteredProblems.length === 0 && (
                    <div className="p-16 text-center text-slate-600 font-sci-fi font-black text-xl tracking-widest flex flex-col items-center gap-4">
                      <Swords size={64} className="opacity-30" />
                      SYSTEM_EMPTY // NO DATA
                    </div>
                  )}
                </div>
              </div>

              <div className="hud-panel p-6 md:p-8 border-t-4 border-t-blue-500">
                <div className="scanlines"></div>
                <h3 className="text-2xl font-sci-fi font-black text-white mb-8 flex items-center gap-3 tracking-widest uppercase relative z-10">
                  <Plus size={24} className="text-blue-400" />
                  INPUT_DATA
                </h3>
                
                <form onSubmit={handleAddProblem} className="space-y-6 relative z-10">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2 font-mono uppercase">Platform</label>
                    <select value={newPlatform} onChange={(e) => setNewPlatform(e.target.value)} className="cyber-select w-full bg-black/40 border border-slate-700 text-slate-100 px-4 py-3 focus:border-blue-500 outline-none font-sci-fi font-bold text-base tracking-widest uppercase backdrop-blur-sm transition-colors" style={{ transform: 'skewX(-5deg)' }}>
                      <option value="Codeforces">Codeforces</option> 
                      <option value="AtCoder">AtCoder</option> 
                      <option value="牛客">牛客</option> 
                      <option value="luogu">luogu</option>
                    </select>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2 font-mono uppercase">Problem Title</label>
                    <input type="text" value={newTitle} onChange={(e) => setNewTitle(e.target.value)} placeholder="e.g. A. Watermelon" className="w-full bg-black/40 border border-slate-700 text-slate-100 px-4 py-3 focus:border-blue-500 outline-none font-bold text-base backdrop-blur-sm transition-colors" style={{ transform: 'skewX(-5deg)' }} />
                  </div>

                  <div className="p-4 hud-inner-glass border border-slate-700/50 relative">
                    <label className="flex items-center justify-between text-xs font-bold text-cyan-500 mb-3 font-mono uppercase">
                      <span className="flex items-center gap-2"><FileText size={14}/> MD_Payload</span>
                      <label className="cursor-pointer bg-cyan-950/30 text-cyan-400 px-2 py-1 border border-cyan-800 hover:bg-cyan-900/80 transition-colors flex items-center gap-1" style={{ transform: 'skewX(-10deg)' }}>
                        <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}><Upload size={12} className="inline mr-1"/>Import_MD</span>
                        <input type="file" accept=".md,.txt" onChange={handleMdFileUpload} className="hidden" />
                      </label>
                    </label>
                    <textarea value={markdownContent} onChange={(e) => setMarkdownContent(e.target.value)} placeholder="输入 Markdown 数据，支持 LaTeX 与代码块..." rows="5" className="w-full bg-transparent border-t border-slate-800 text-slate-300 pt-3 focus:outline-none font-mono text-sm leading-relaxed" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-2 font-mono uppercase">Tags</label>
                    <input type="text" value={newTags} onChange={(e) => setNewTags(e.target.value)} placeholder="DP, 图论, 数学..." className="w-full bg-black/40 border border-slate-700 text-slate-100 rounded-lg px-4 py-3 focus:border-blue-500 transition-all font-bold backdrop-blur-sm" />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-3 font-mono uppercase">Difficulty Level</label>
                    <div className="grid grid-cols-3 gap-3">
                      {['简单', '中等', '困难'].map(diff => (
                        <button key={diff} type="button" onClick={() => setNewDifficulty(diff)}
                          className={`py-2 text-sm border font-sci-fi font-bold tracking-widest uppercase transition-all ${
                            newDifficulty === diff 
                              ? (diff === '简单' ? 'bg-green-900/50 border-green-500 text-green-400' :
                                 diff === '中等' ? 'bg-orange-900/50 border-orange-500 text-orange-400' :
                                 'bg-red-900/50 border-red-500 text-red-400')
                              : 'hud-inner-glass border-slate-700/50 text-slate-400 hover:border-slate-500'
                          }`}
                          style={{ transform: 'skewX(-10deg)' }}
                        >
                          <span style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>{diff}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  <button type="submit" disabled={!newTitle.trim()}
                    className="w-full mt-8 bg-blue-600/80 hover:bg-blue-500 text-white font-sci-fi font-black py-4 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-3 uppercase tracking-widest text-lg border border-blue-400/50"
                    style={{ transform: 'skewX(-10deg)' }}
                  >
                    <span className="flex items-center gap-2" style={{ display: 'inline-block', transform: 'skewX(10deg)' }}>
                      <Swords size={20} className="inline mr-2" /> EXECUTE_WRITE
                    </span>
                  </button>
                </form>
              </div>

            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
