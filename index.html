<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMer 核心控制台 - 究极版</title>
  <!-- 引入 Tailwind CSS 并开启 typography 插件以支持 Markdown 渲染美化 -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <!-- 引入 Babel 解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 引入 Marked.js 用于解析 Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* 全局滚动条美化 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    ::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(239, 68, 68, 0.8); }

    /* 游戏级屏幕震动与脉冲发光 */
    @keyframes god-mode-shake {
      0%, 100% { transform: translate(0, 0); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-2px, 2px); }
      20%, 40%, 60%, 80% { transform: translate(2px, -2px); }
    }
    @keyframes super-pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(239, 68, 68, 0.5), inset 0 0 20px rgba(239, 68, 68, 0.2); }
      50% { box-shadow: 0 0 60px rgba(239, 68, 68, 0.9), inset 0 0 40px rgba(239, 68, 68, 0.5); border-color: rgba(255,100,100,1); }
    }
    .shake-active { animation: god-mode-shake 0.5s ease-in-out; }
    .animate-super-glow { animation: super-pulse 1.5s ease-in-out infinite; }
    
    /* 极致毛玻璃面板 */
    .glass-panel {
      background: rgba(10, 15, 30, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    /* Markdown 渲染区样式覆写 */
    .prose pre { background-color: rgba(15, 23, 42, 0.8) !important; border: 1px solid rgba(255,255,255,0.1); }
    .prose code { color: #67e8f9 !important; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 overflow-x-hidden selection:bg-cyan-500/30">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Trophy, Flame, Code2, CheckCircle2, 
      Swords, TrendingUp, Activity, Search, ChevronDown, ChevronUp, Tag,
      Settings, Image as ImageIcon, X, Plus, FileText, Upload
    } from 'https://esm.sh/lucide-react@0.263.1';

    // ==========================================
    // 游戏级 3D 粒子穿越引擎 (Canvas)
    // ==========================================
    const WarpSpeedBackground = ({ isGodMode }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const stars = [];
        const numStars = 800; // 粒子数量

        // 初始化星星
        for (let i = 0; i < numStars; i++) {
          stars.push({
            x: Math.random() * width * 2 - width,
            y: Math.random() * height * 2 - height,
            z: Math.random() * width,
            o: '0.' + Math.floor(Math.random() * 99) + 1
          });
        }

        let animationFrameId;

        const executeFrame = () => {
          // 根据状态动态调整背景残影和速度
          ctx.fillStyle = isGodMode ? 'rgba(10, 0, 0, 0.2)' : 'rgba(5, 10, 20, 0.2)';
          ctx.fillRect(0, 0, width, height);

          // 超神状态：速度极快，普通状态：缓慢巡航
          const speed = isGodMode ? 25 : 2;
          const centerX = width / 2;
          const centerY = height / 2;

          for (let i = 0; i < numStars; i++) {
            let star = stars[i];
            star.z -= speed;

            // 如果粒子飞出屏幕，重置到远处
            if (star.z <= 0) {
              star.z = width;
              star.x = Math.random() * width * 2 - width;
              star.y = Math.random() * height * 2 - height;
            }

            // 3D 投影到 2D 屏幕
            const x = centerX + (star.x / star.z) * width;
            const y = centerY + (star.y / star.z) * width;
            const size = (1 - star.z / width) * (isGodMode ? 4 : 2); // 越近越大

            // 超神状态下粒子变为红黄渐变，平时为青蓝色
            if (isGodMode) {
              const r = 255;
              const g = Math.floor(100 * (star.z / width)); // 远红近黄
              ctx.fillStyle = `rgba(${r}, ${g}, 0, ${1 - star.z/width})`;
            } else {
              ctx.fillStyle = `rgba(6, 182, 212, ${1 - star.z/width})`;
            }

            // 绘制粒子拖尾
            const px = centerX + (star.x / (star.z + speed)) * width;
            const py = centerY + (star.y / (star.z + speed)) * width;
            
            ctx.beginPath();
            ctx.lineWidth = size;
            ctx.moveTo(px, py);
            ctx.lineTo(x, y);
            ctx.strokeStyle = ctx.fillStyle;
            ctx.stroke();
          }
          animationFrameId = requestAnimationFrame(executeFrame);
        };

        executeFrame();

        const handleResize = () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', handleResize);

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', handleResize);
        };
      }, [isGodMode]);

      return (
        <canvas 
          ref={canvasRef} 
          className="fixed inset-0 z-0 pointer-events-none mix-blend-screen"
        />
      );
    };

    // ==========================================
    // 主应用程序
    // ==========================================
    const App = () => {
      const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      // --- 数据持久化 ---
      const [problems, setProblems] = useState(() => {
        const savedData = localStorage.getItem('acmer_tracker_data_v3');
        return savedData ? JSON.parse(savedData) : [];
      });

      const [bgImage, setBgImage] = useState(() => {
        return localStorage.getItem('acmer_local_bg') || '';
      });

      useEffect(() => {
        localStorage.setItem('acmer_tracker_data_v3', JSON.stringify(problems));
      }, [problems]);

      useEffect(() => {
        localStorage.setItem('acmer_local_bg', bgImage);
      }, [bgImage]);

      // --- 表单状态 ---
      const [newPlatform, setNewPlatform] = useState('Codeforces');
      const [newTitle, setNewTitle] = useState('');
      const [newDifficulty, setNewDifficulty] = useState('中等');
      const [newTags, setNewTags] = useState('');
      const [markdownContent, setMarkdownContent] = useState(''); // 直接存储 MD 内容
      
      const [searchQuery, setSearchQuery] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      const [showSettings, setShowSettings] = useState(false);

      // 统计与状态
      const todayCount = problems.filter(p => p.date === getTodayStr()).length;
      const isGodMode = todayCount >= 5; 

      // --- 核心方法：提交新题目 ---
      const handleAddProblem = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;

        const newProblem = {
          id: Date.now(),
          title: newTitle,
          platform: newPlatform,
          date: getTodayStr(),
          difficulty: newDifficulty,
          tags: newTags.split(',').map(t => t.trim()).filter(t => t !== ''),
          markdown: markdownContent // 保存题解内容
        };

        setProblems([newProblem, ...problems]);
        // 清空表单
        setNewTitle('');
        setNewTags('');
        setMarkdownContent('');
      };

      // --- 本地读取 MD 文件 ---
      const handleMdFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setMarkdownContent(event.target.result);
        };
        reader.readAsText(file);
      };

      // --- 本地读取图片作为全局背景 ---
      const handleBgImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          // 为了防止超出 localStorage 容量，使用 Canvas 自动压缩图片
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const MAX_WIDTH = 1920;
            const MAX_HEIGHT = 1080;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            } else {
              if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
            }
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);
            
            // 压缩为 JPEG, 质量 0.7
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            setBgImage(dataUrl);
            setShowSettings(false);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      // --- 游戏级评级系统 ---
      const getStatusEffect = (count) => {
        if (count === 0) return { label: '待机中 (Sleeping)', color: 'text-slate-500', glow: '' };
        if (count <= 2) return { label: '渐入佳境 (Warming Up)', color: 'text-emerald-400', glow: 'shadow-[0_0_20px_rgba(16,185,129,0.3)] border-emerald-500/40' };
        if (count <= 4) return { label: '势不可挡 (Unstoppable)', color: 'text-cyan-400', glow: 'shadow-[0_0_30px_rgba(6,182,212,0.5)] border-cyan-400/60' };
        return { label: '超神时刻 (GOD MODE!)', color: 'text-red-500 font-black', glow: 'animate-super-glow border-red-500' };
      };
      const currentStatus = getStatusEffect(todayCount);

      // --- 热力图生成 ---
      const heatmapData = useMemo(() => {
        const days = [];
        const countsByDate = {};
        problems.forEach(p => countsByDate[p.date] = (countsByDate[p.date] || 0) + 1);

        for (let i = 59; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          days.push({ date: dateStr, count: countsByDate[dateStr] || 0 });
        }
        return days;
      }, [problems]);

      const getHeatmapColor = (count) => {
        if (count === 0) return 'bg-slate-800/40 border-slate-700';
        if (count <= 2) return 'bg-cyan-900/80 border-cyan-700 shadow-[0_0_8px_rgba(6,182,212,0.4)]';
        if (count <= 4) return 'bg-cyan-500 border-cyan-300 shadow-[0_0_15px_rgba(6,182,212,0.8)]';
        return 'bg-red-500 border-red-300 shadow-[0_0_20px_rgba(239,68,68,1)]'; // 满载爆发
      };

      const filteredProblems = problems.filter(p => {
        const query = searchQuery.toLowerCase();
        const tagMatch = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
        return p.title.toLowerCase().includes(query) || p.platform.toLowerCase().includes(query) || tagMatch;
      });

      return (
        <div className={`min-h-screen relative font-sans ${isGodMode ? 'shake-active' : ''}`}>
          
          {/* 用户上传的自定义背景图 */}
          {bgImage && (
            <div 
              className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-50"
              style={{ backgroundImage: `url(${bgImage})` }}
            />
          )}

          {/* 红色警报边框遮罩 (超神状态专属) */}
          {isGodMode && (
            <div className="fixed inset-0 z-0 pointer-events-none shadow-[inset_0_0_150px_rgba(239,68,68,0.4)] mix-blend-screen" />
          )}
          
          {/* 3D 粒子背景 */}
          <WarpSpeedBackground isGodMode={isGodMode} />

          {/* 主体 UI 内容区 */}
          <div className="max-w-7xl mx-auto space-y-6 relative z-10 p-4 md:p-8">
            
            {/* 顶栏 */}
            <header className="flex items-center justify-between glass-panel p-5 rounded-2xl">
              <div className="flex items-center gap-4">
                <div className={`p-3 rounded-xl ${isGodMode ? 'bg-red-600 animate-pulse shadow-[0_0_20px_#ef4444]' : 'bg-cyan-600'}`}>
                  <Code2 className="text-white w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                    ACMer 核心控制台
                  </h1>
                  <p className="text-slate-400 text-xs font-mono tracking-widest mt-1">SYSTEM_ONLINE // KEEP_CODING</p>
                </div>
              </div>
              <div className="flex items-center gap-6">
                <div className="text-right hidden md:block">
                  <p className="text-xs text-slate-400 font-bold uppercase tracking-wider">总计攻克</p>
                  <p className="text-4xl font-black text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
                    {problems.length}
                  </p>
                </div>
                {/* 开启本地背景上传 */}
                <button 
                  onClick={() => setShowSettings(!showSettings)}
                  className="p-3 bg-slate-800/80 hover:bg-slate-700 rounded-xl border border-slate-600 transition-all hover:rotate-180 duration-500"
                >
                  <Settings className="text-slate-300" />
                </button>
              </div>
            </header>

            {/* 本地图片上传面板 */}
            {showSettings && (
              <div className="glass-panel p-6 rounded-2xl border-2 border-cyan-500/50 flex flex-col md:flex-row items-center gap-6 animate-pulse">
                <div className="p-4 bg-cyan-900/30 rounded-full border border-cyan-500/30">
                  <ImageIcon className="text-cyan-400 w-8 h-8" />
                </div>
                <div className="flex-1 w-full">
                  <label className="block text-sm font-bold text-cyan-300 mb-2">更改全局背景图 (本地上传)</label>
                  <label className="cursor-pointer flex items-center justify-center gap-2 w-full py-4 border-2 border-dashed border-cyan-500/40 rounded-xl hover:bg-cyan-900/20 transition-all text-slate-300">
                    <Upload size={18} /> 点击选择本地高清图片
                    <input type="file" accept="image/*" onChange={handleBgImageUpload} className="hidden" />
                  </label>
                  <p className="text-xs text-slate-500 mt-2">图片将自动压缩并安全保存在您的浏览器本地缓存中。</p>
                </div>
                <button onClick={() => setShowSettings(false)} className="p-2 bg-slate-800 rounded-full text-slate-400 hover:text-white">
                  <X />
                </button>
              </div>
            )}

            {/* 状态展示大屏 */}
            <section className={`glass-panel rounded-2xl p-6 md:p-8 transition-all duration-700 border ${currentStatus.glow}`}>
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-6">
                  <div className={`p-6 rounded-2xl bg-slate-950/80 border ${isGodMode ? 'border-red-500 shadow-[0_0_40px_#ef4444]' : 'border-slate-700'}`}>
                    {isGodMode ? <Flame size={60} className="text-red-500 animate-bounce" /> : <Trophy size={60} className={currentStatus.color} />}
                  </div>
                  <div>
                    <p className="text-sm font-bold text-slate-400 mb-1 tracking-widest">当前火热评级</p>
                    <h2 className={`text-4xl md:text-5xl tracking-tight ${currentStatus.color}`} style={{ textShadow: isGodMode ? '0 0 30px #ef4444' : 'none' }}>
                      {currentStatus.label}
                    </h2>
                    <p className="text-slate-300 mt-3 text-lg font-medium">
                      今日已斩获 <span className="text-4xl font-black mx-3 text-white drop-shadow-md">{todayCount}</span> 道算法题
                    </p>
                  </div>
                </div>
                
                {/* 科幻风格能量槽 */}
                <div className="w-full md:w-80 bg-slate-950 rounded-r-full rounded-l-full h-8 overflow-hidden border-2 border-slate-700 relative shadow-inner">
                  <div 
                    className={`h-full transition-all duration-1000 relative ${isGodMode ? 'bg-gradient-to-r from-red-700 via-red-500 to-yellow-500' : 'bg-gradient-to-r from-cyan-700 via-cyan-500 to-blue-500'}`}
                    style={{ width: `${Math.min((todayCount / 5) * 100, 100)}%` }}
                  >
                    <div className="absolute top-0 left-0 right-0 h-1/2 bg-white/30 rounded-t-full"></div>
                  </div>
                  <div className="absolute inset-0 flex items-center justify-end pr-4 font-black text-xs text-slate-400 mix-blend-difference">
                    TARGET: 5
                  </div>
                </div>
              </div>
            </section>

            {/* 左右分栏布局 */}
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 左侧：数据面板 */}
              <div className="lg:col-span-2 space-y-6">
                
                {/* 热力图 */}
                <div className="glass-panel rounded-2xl p-6">
                  <h3 className="text-lg font-black text-white mb-6 flex items-center gap-2">
                    <Activity size={22} className="text-cyan-400"/> 
                    神经网络突触活跃度 (近 60 天)
                  </h3>
                  <div className="grid grid-flow-col grid-rows-7 gap-2 overflow-x-auto pb-2">
                    {heatmapData.map((day, i) => (
                      <div 
                        key={i}
                        title={`${day.date}: AC ${day.count} 题`}
                        className={`w-4 h-4 md:w-5 md:h-5 rounded-[4px] border transition-all duration-300 hover:scale-125 cursor-crosshair ${getHeatmapColor(day.count)}`}
                      />
                    ))}
                  </div>
                </div>

                {/* 题目列表区 */}
                <div className="glass-panel rounded-2xl overflow-hidden flex flex-col" style={{ maxHeight: '800px' }}>
                  <div className="p-5 border-b border-slate-700/60 bg-slate-900/60 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <h3 className="font-black text-white flex items-center gap-2 text-lg">
                      <CheckCircle2 size={22} className="text-emerald-400" />
                      战斗记录归档
                    </h3>
                    <div className="relative w-full sm:w-80">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-cyan-500 w-5 h-5" />
                      <input 
                        type="text" 
                        placeholder="检索题目或标签..." 
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full pl-10 pr-4 py-2.5 bg-slate-950/90 border border-slate-700 rounded-xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all outline-none text-slate-100 font-medium"
                      />
                    </div>
                  </div>
                  
                  <div className="divide-y divide-slate-700/40 overflow-y-auto flex-1 p-2">
                    {filteredProblems.map(problem => (
                      <div key={problem.id} className="flex flex-col mb-2 bg-slate-800/30 hover:bg-slate-800/80 rounded-xl transition-all border border-transparent hover:border-slate-600">
                        <div 
                          className="p-4 flex items-center justify-between cursor-pointer group"
                          onClick={() => setExpandedId(expandedId === problem.id ? null : problem.id)}
                        >
                          <div className="flex items-center gap-4">
                            <div className="text-cyan-300 border border-cyan-800 bg-cyan-950/50 font-bold px-3 py-1 rounded-lg hidden sm:block shadow-inner">
                              {problem.platform}
                            </div>
                            <span className="font-bold text-slate-100 text-lg group-hover:text-cyan-400 transition-colors drop-shadow-sm">
                              {problem.title}
                            </span>
                          </div>
                          <div className="flex items-center gap-4 shrink-0">
                            {/* 提示包含题解 */}
                            {problem.markdown && (
                              <span className="text-emerald-300 flex items-center gap-1 text-xs font-black bg-emerald-900/40 px-2 py-1.5 rounded-lg border border-emerald-700 shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                                <FileText size={14} /> 附题解
                              </span>
                            )}
                            <span className={`text-xs px-3 py-1.5 rounded-lg font-black border ${
                              problem.difficulty === '困难' ? 'bg-red-950/50 text-red-400 border-red-800' :
                              problem.difficulty === '中等' ? 'bg-orange-950/50 text-orange-400 border-orange-800' :
                              'bg-green-950/50 text-green-400 border-green-800'
                            }`}>
                              {problem.difficulty}
                            </span>
                            <div className="p-1 bg-slate-900 rounded-md">
                              {expandedId === problem.id ? <ChevronUp size={20} className="text-cyan-400"/> : <ChevronDown size={20} className="text-slate-500"/>}
                            </div>
                          </div>
                        </div>
                        
                        {/* 展开的 Markdown 渲染面板 */}
                        {expandedId === problem.id && (
                          <div className="px-6 pb-6 pt-2 border-t border-slate-700/50 bg-slate-950/60 rounded-b-xl">
                            {problem.markdown ? (
                              <div className="mt-4">
                                <p className="text-xs text-cyan-400 font-bold uppercase mb-3 flex items-center gap-2">
                                  <FileText size={14} /> 题解与分析报告
                                </p>
                                <div 
                                  className="prose prose-invert prose-cyan max-w-none bg-slate-900/80 p-5 rounded-xl border border-slate-700"
                                  dangerouslySetInnerHTML={{ __html: marked.parse(problem.markdown) }}
                                />
                              </div>
                            ) : (
                              <div className="mt-4 p-5 bg-slate-900/50 rounded-xl text-center text-slate-500 border border-slate-800 border-dashed">
                                这道题还没有记录题解代码哦...
                              </div>
                            )}
                            
                            <div className="mt-5 flex flex-wrap items-center gap-3">
                              <Tag size={18} className="text-slate-500" />
                              {problem.tags && problem.tags.length > 0 ? (
                                problem.tags.map((tag, idx) => (
                                  <span key={idx} className="text-sm px-3 py-1 bg-slate-800 text-cyan-300 rounded-lg border border-slate-600 font-bold">
                                    {tag}
                                  </span>
                                ))
                              ) : (
                                <span className="text-sm text-slate-600">未贴标签</span>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                    {filteredProblems.length === 0 && (
                      <div className="p-16 text-center text-slate-500 font-bold text-xl flex flex-col items-center gap-4">
                        <Swords size={64} className="text-slate-700 opacity-50" />
                        数据库空空如也，赶快去 AC 一道题吧！
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* 右侧：录入表单面板 */}
              <div className="space-y-6">
                <div className="glass-panel rounded-2xl p-6 border-t-4 border-t-cyan-500 shadow-[0_-5px_20px_rgba(6,182,212,0.15)] relative overflow-hidden">
                  
                  {/* 背景装饰 */}
                  <div className="absolute -top-10 -right-10 opacity-[0.03]">
                    <Plus size={200} />
                  </div>

                  <h3 className="text-2xl font-black text-white mb-6 flex items-center gap-2 relative z-10">
                    <CheckCircle2 size={28} className="text-cyan-400" />
                    录入新战绩
                  </h3>
                  
                  <form onSubmit={handleAddProblem} className="space-y-5 relative z-10">
                    <div>
                      <label className="block text-sm font-bold text-slate-300 mb-2">选择刷题平台</label>
                      <select 
                        value={newPlatform}
                        onChange={(e) => setNewPlatform(e.target.value)}
                        className="w-full bg-slate-950 border border-slate-700 text-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all font-bold"
                      >
                        <option>Codeforces</option>
                        <option>AtCoder</option>
                        <option>LeetCode</option>
                        <option>洛谷 (Luogu)</option>
                        <option>牛客 (NowCoder)</option>
                        <option>HDU / POJ</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-slate-300 mb-2">题目名称 / 题号</label>
                      <input 
                        type="text"
                        value={newTitle}
                        onChange={(e) => setNewTitle(e.target.value)}
                        placeholder="例如：A. Watermelon"
                        className="w-full bg-slate-950 border border-slate-700 text-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all font-bold"
                      />
                    </div>

                    {/* 直接上传或填写 MD 文件内容 */}
                    <div className="p-4 bg-slate-900/60 rounded-xl border border-slate-700">
                      <label className="flex items-center justify-between text-sm font-bold text-emerald-400 mb-3">
                        <span className="flex items-center gap-1"><FileText size={16}/> 题解内容 (Markdown)</span>
                        <label className="cursor-pointer text-xs bg-emerald-900/50 text-emerald-300 px-3 py-1.5 rounded-md hover:bg-emerald-800 transition-colors flex items-center gap-1 border border-emerald-700">
                          <Upload size={14}/> 导入 .md 文件
                          <input type="file" accept=".md,.txt" onChange={handleMdFileUpload} className="hidden" />
                        </label>
                      </label>
                      <textarea 
                        value={markdownContent}
                        onChange={(e) => setMarkdownContent(e.target.value)}
                        placeholder="支持 Markdown 语法。你可以直接在这里手写思路，粘贴代码；也可以点击右上角直接导入本地的 .md 文件！"
                        rows="6"
                        className="w-full bg-slate-950 border border-slate-800 text-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:border-emerald-500 transition-all font-mono text-sm leading-relaxed"
                      ></textarea>
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-slate-300 mb-2">算法标签 (空格或逗号隔开)</label>
                      <input 
                        type="text"
                        value={newTags}
                        onChange={(e) => setNewTags(e.target.value)}
                        placeholder="动态规划, DFS, 数学..."
                        className="w-full bg-slate-950 border border-slate-700 text-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-slate-300 mb-2">难度评估</label>
                      <div className="grid grid-cols-3 gap-3">
                        {['简单', '中等', '困难'].map(diff => (
                          <button
                            key={diff}
                            type="button"
                            onClick={() => setNewDifficulty(diff)}
                            className={`py-2.5 text-sm rounded-xl border-2 font-black transition-all ${
                              newDifficulty === diff 
                                ? (diff === '简单' ? 'bg-green-900/40 border-green-500 text-green-400 shadow-[0_0_15px_rgba(34,197,94,0.4)]' :
                                   diff === '中等' ? 'bg-orange-900/40 border-orange-500 text-orange-400 shadow-[0_0_15px_rgba(249,115,22,0.4)]' :
                                   'bg-red-900/40 border-red-500 text-red-400 shadow-[0_0_15px_rgba(239,68,68,0.4)]')
                                : 'bg-slate-900 border-slate-800 text-slate-500 hover:border-slate-600 hover:text-slate-300'
                            }`}
                          >
                            {diff}
                          </button>
                        ))}
                      </div>
                    </div>

                    <button 
                      type="submit"
                      disabled={!newTitle.trim()}
                      className="w-full mt-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black rounded-xl py-4 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(6,182,212,0.5)] text-lg tracking-widest"
                    >
                      <Swords size={22} />
                      确认记录 AC
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
