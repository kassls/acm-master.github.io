<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACMer Daily Tracker - Pro Max</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局滚动条美化 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }

    /* 酷炫动画定义 */
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4), 0 0 40px rgba(239, 68, 68, 0.2); }
      50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.8), 0 0 80px rgba(239, 68, 68, 0.4); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .animate-super-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    /* 毛玻璃通用类 */
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Trophy, Flame, Code2, CheckCircle2, 
      Swords, TrendingUp, Activity, Search, ChevronDown, ChevronUp, Tag,
      ExternalLink, Settings, Image as ImageIcon, X, Plus
    } from 'https://esm.sh/lucide-react@0.263.1';

    // --- 全屏 Matrix 代码雨组件 ---
    const MatrixBackground = ({ isGodMode }) => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ{}();:<>[]'.split('');
        const fontSize = 14;
        const columns = width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) drops[x] = 1;

        const draw = () => {
          // God Mode 下背景残影更深，速度感更强
          ctx.fillStyle = isGodMode ? 'rgba(0, 0, 0, 0.1)' : 'rgba(0, 0, 0, 0.05)';
          ctx.fillRect(0, 0, width, height);

          // God Mode 下是猩红色，普通状态是赛博绿色
          ctx.fillStyle = isGodMode ? '#ef4444' : '#10b981';
          ctx.font = fontSize + 'px monospace';

          for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > height && Math.random() > 0.975) {
              drops[i] = 0;
            }
            drops[i]++;
          }
        };

        const interval = setInterval(draw, isGodMode ? 30 : 50);

        const handleResize = () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', handleResize);

        return () => {
          clearInterval(interval);
          window.removeEventListener('resize', handleResize);
        };
      }, [isGodMode]);

      return (
        <canvas 
          ref={canvasRef} 
          className="fixed inset-0 z-0 pointer-events-none opacity-30 mix-blend-screen"
        />
      );
    };

    const App = () => {
      const getTodayStr = () => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      // --- 状态与本地存储 ---
      const [problems, setProblems] = useState(() => {
        const savedData = localStorage.getItem('acmer_tracker_data_v2');
        return savedData ? JSON.parse(savedData) : [];
      });

      const [bgImage, setBgImage] = useState(() => {
        return localStorage.getItem('acmer_bg_image') || '';
      });

      useEffect(() => {
        localStorage.setItem('acmer_tracker_data_v2', JSON.stringify(problems));
      }, [problems]);

      useEffect(() => {
        localStorage.setItem('acmer_bg_image', bgImage);
      }, [bgImage]);

      // --- 表单状态 ---
      const [newTitle, setNewTitle] = useState('');
      const [newPlatform, setNewPlatform] = useState('Codeforces');
      const [newDifficulty, setNewDifficulty] = useState('Medium');
      const [newDescription, setNewDescription] = useState('');
      const [newThoughts, setNewThoughts] = useState('');
      const [newTags, setNewTags] = useState('');
      const [newUrl, setNewUrl] = useState(''); // 新增：题解外链

      const [searchQuery, setSearchQuery] = useState('');
      const [expandedId, setExpandedId] = useState(null);
      const [showSettings, setShowSettings] = useState(false);

      const handleAddProblem = (e) => {
        e.preventDefault();
        if (!newTitle.trim()) return;

        const newProblem = {
          id: Date.now(),
          title: newTitle,
          platform: newPlatform,
          date: getTodayStr(),
          difficulty: newDifficulty,
          description: newDescription,
          thoughts: newThoughts,
          url: newUrl.trim(),
          tags: newTags.split(',').map(t => t.trim()).filter(t => t !== '')
        };

        setProblems([newProblem, ...problems]);
        setNewTitle('');
        setNewDescription('');
        setNewThoughts('');
        setNewTags('');
        setNewUrl('');
      };

      const todayCount = problems.filter(p => p.date === getTodayStr()).length;
      const isGodMode = todayCount >= 5; // 达到 5 题触发全屏猩红暴走特效

      // --- 酷炫状态评级 ---
      const getStatusEffect = (count) => {
        if (count === 0) return { label: 'Sleeping (沉睡中)', color: 'text-slate-400', bg: 'glass-panel', glow: '' };
        if (count <= 2) return { label: 'Warming Up (引擎预热)', color: 'text-emerald-400', bg: 'glass-panel border-emerald-500/30', glow: 'shadow-[0_0_15px_rgba(16,185,129,0.2)]' };
        if (count <= 4) return { label: 'Unstoppable (势不可挡)', color: 'text-cyan-400', bg: 'glass-panel border-cyan-500/50', glow: 'shadow-[0_0_25px_rgba(6,182,212,0.4)]' };
        // 终极状态
        return { label: 'GOD MODE (超神时刻!)', color: 'text-red-500 font-black', bg: 'glass-panel border-red-500', glow: 'animate-super-glow' };
      };

      const currentStatus = getStatusEffect(todayCount);

      // --- 热力图数据 ---
      const heatmapData = useMemo(() => {
        const days = [];
        const countsByDate = {};
        problems.forEach(p => countsByDate[p.date] = (countsByDate[p.date] || 0) + 1);

        for (let i = 59; i >= 0; i--) {
          const d = new Date();
          d.setDate(d.getDate() - i);
          const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
          days.push({ date: dateStr, count: countsByDate[dateStr] || 0 });
        }
        return days;
      }, [problems]);

      const getHeatmapColor = (count) => {
        if (count === 0) return 'bg-slate-800/50 border-slate-700';
        if (count <= 2) return 'bg-emerald-900/80 border-emerald-700 shadow-[0_0_5px_rgba(16,185,129,0.3)]';
        if (count <= 4) return 'bg-emerald-600 border-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.6)]';
        return 'bg-red-500 border-red-300 shadow-[0_0_15px_rgba(239,68,68,0.8)]'; // 爆表发红
      };

      const filteredProblems = problems.filter(p => {
        const query = searchQuery.toLowerCase();
        const tagMatch = p.tags && p.tags.some(t => t.toLowerCase().includes(query));
        return p.title.toLowerCase().includes(query) || p.platform.toLowerCase().includes(query) || tagMatch;
      });

      return (
        <div className="min-h-screen relative font-sans selection:bg-indigo-500/30">
          {/* 背景图片 */}
          {bgImage && (
            <div 
              className="fixed inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-40"
              style={{ backgroundImage: `url(${bgImage})` }}
            />
          )}
          
          {/* Matrix 全屏特效 (绝对在最底层，但在背景图之上一点点) */}
          <MatrixBackground isGodMode={isGodMode} />

          {/* 顶层内容 */}
          <div className="max-w-7xl mx-auto space-y-8 relative z-10 p-4 md:p-8">
            
            {/* 顶部导航 */}
            <header className="flex items-center justify-between glass-panel p-4 rounded-2xl">
              <div className="flex items-center gap-4">
                <div className={`p-3 rounded-xl ${isGodMode ? 'bg-red-600 animate-pulse' : 'bg-indigo-600'}`}>
                  <Code2 className="text-white w-8 h-8" />
                </div>
                <div>
                  <h1 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                    ACMer Nexus
                  </h1>
                  <p className="text-slate-400 text-sm font-mono tracking-widest">SYSTEM_ONLINE // KEEP_CODING</p>
                </div>
              </div>
              <div className="flex items-center gap-6">
                <div className="text-right hidden md:block">
                  <p className="text-xs text-slate-400 font-mono uppercase">Total Accepted</p>
                  <p className="text-4xl font-black text-white" style={{ textShadow: '0 0 20px rgba(255,255,255,0.3)' }}>
                    {problems.length}
                  </p>
                </div>
                {/* 设置按钮 */}
                <button 
                  onClick={() => setShowSettings(!showSettings)}
                  className="p-3 bg-slate-800/80 hover:bg-slate-700 rounded-xl border border-slate-600 transition-all hover:rotate-90"
                >
                  <Settings className="text-slate-300" />
                </button>
              </div>
            </header>

            {/* 设置面板 (动态展开) */}
            {showSettings && (
              <div className="glass-panel p-6 rounded-2xl border border-indigo-500/30 flex items-center gap-4 animate-[float_3s_ease-in-out_infinite]">
                <ImageIcon className="text-indigo-400 shrink-0" />
                <div className="flex-1">
                  <label className="block text-xs font-bold text-indigo-300 mb-1 tracking-wider">自定义背景图片 URL (Wallpaper)</label>
                  <input 
                    type="text" 
                    value={bgImage}
                    onChange={(e) => setBgImage(e.target.value)}
                    placeholder="粘贴一张超酷的高清图片链接，例如: https://.../img.jpg"
                    className="w-full bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"
                  />
                </div>
                <button onClick={() => setShowSettings(false)} className="p-2 text-slate-400 hover:text-white mt-5">
                  <X />
                </button>
              </div>
            )}

            {/* 核心特效展示区 */}
            <section className={`rounded-2xl p-6 md:p-8 transition-all duration-700 ${currentStatus.bg} ${currentStatus.glow}`}>
              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                <div className="flex items-center gap-6">
                  <div className={`p-5 rounded-2xl bg-slate-900/80 border ${isGodMode ? 'border-red-500 shadow-[0_0_30px_#ef4444]' : 'border-slate-700'}`}>
                    {isGodMode ? <Flame size={50} className="text-red-500 animate-bounce" /> : <Trophy size={50} className={currentStatus.color} />}
                  </div>
                  <div>
                    <p className="text-xs font-mono text-slate-400 mb-1 uppercase tracking-widest">Current Status</p>
                    <h2 className={`text-4xl md:text-5xl tracking-tight ${currentStatus.color}`} style={{ textShadow: isGodMode ? '0 0 20px #ef4444' : 'none' }}>
                      {currentStatus.label}
                    </h2>
                    <p className="text-slate-300 mt-2 text-lg">
                      今日已斩获 <span className="text-3xl font-black mx-2 text-white">{todayCount}</span> 题
                    </p>
                  </div>
                </div>
                
                {/* 能量槽 */}
                <div className="w-full md:w-72 bg-slate-950 rounded-full h-6 overflow-hidden border border-slate-700 relative">
                  <div 
                    className={`h-full transition-all duration-1000 relative ${isGodMode ? 'bg-gradient-to-r from-red-600 to-orange-500' : 'bg-gradient-to-r from-cyan-600 to-indigo-600'}`}
                    style={{ width: `${Math.min((todayCount / 5) * 100, 100)}%` }}
                  >
                    {/* 能量条反光效果 */}
                    <div className="absolute top-0 left-0 right-0 h-1/2 bg-white/20"></div>
                  </div>
                </div>
              </div>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              {/* 左侧：数据与列表 */}
              <div className="lg:col-span-2 space-y-8">
                
                {/* 活跃度热力图 */}
                <div className="glass-panel rounded-2xl p-6">
                  <div className="flex items-center justify-between mb-6">
                    <h3 className="text-lg font-bold flex items-center gap-2 text-white">
                      <Activity size={20} className="text-cyan-400"/> 
                      神经网络活跃度 (Heatmap)
                    </h3>
                  </div>
                  
                  <div className="grid grid-flow-col grid-rows-7 gap-2 overflow-x-auto pb-4">
                    {heatmapData.map((day, i) => (
                      <div 
                        key={i}
                        title={`${day.date}: ${day.count} AC`}
                        className={`w-4 h-4 md:w-5 md:h-5 rounded-md border transition-all duration-300 hover:scale-125 cursor-pointer ${getHeatmapColor(day.count)}`}
                      />
                    ))}
                  </div>
                </div>

                {/* 题目列表 */}
                <div className="glass-panel rounded-2xl overflow-hidden flex flex-col" style={{ maxHeight: '700px' }}>
                  <div className="p-4 border-b border-slate-700/50 bg-slate-900/50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <h3 className="font-bold text-white flex items-center gap-2">
                      <CheckCircle2 size={18} className="text-emerald-400" />
                      数据归档 (Archive)
                    </h3>
                    <div className="relative w-full sm:w-72">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 w-4 h-4" />
                      <input 
                        type="text" 
                        placeholder="搜索题名、平台或标签..." 
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        className="w-full pl-9 pr-4 py-2 bg-slate-950/80 border border-slate-700 rounded-lg text-sm focus:border-cyan-500 transition-all outline-none text-slate-200"
                      />
                    </div>
                  </div>
                  
                  <div className="divide-y divide-slate-700/50 overflow-y-auto flex-1">
                    {filteredProblems.map(problem => (
                      <div key={problem.id} className="flex flex-col hover:bg-slate-800/40 transition-colors">
                        <div 
                          className="p-4 flex items-center justify-between cursor-pointer group"
                          onClick={() => setExpandedId(expandedId === problem.id ? null : problem.id)}
                        >
                          <div className="flex items-center gap-4">
                            <div className="text-cyan-400 border border-cyan-900 bg-cyan-950/30 text-xs font-mono px-2 py-1 rounded hidden sm:block">
                              {problem.platform}
                            </div>
                            <div className="flex flex-col">
                              <span className="font-bold text-slate-200 text-lg group-hover:text-cyan-300 transition-colors">
                                {problem.title}
                              </span>
                            </div>
                          </div>
                          <div className="flex items-center gap-4 shrink-0">
                            {/* 如果有题解链接，在外层显示一个小图标提示 */}
                            {problem.url && (
                              <span className="text-emerald-400 flex items-center gap-1 text-xs font-bold bg-emerald-950/30 px-2 py-1 rounded border border-emerald-900">
                                <ExternalLink size={12} /> 题解
                              </span>
                            )}
                            <span className={`text-xs px-3 py-1 rounded-full font-bold border ${
                              problem.difficulty === 'Hard' ? 'bg-red-500/10 text-red-400 border-red-500/20' :
                              problem.difficulty === 'Medium' ? 'bg-orange-500/10 text-orange-400 border-orange-500/20' :
                              'bg-green-500/10 text-green-400 border-green-500/20'
                            }`}>
                              {problem.difficulty}
                            </span>
                            {expandedId === problem.id ? <ChevronUp size={20} className="text-cyan-400"/> : <ChevronDown size={20} className="text-slate-500"/>}
                          </div>
                        </div>
                        
                        {/* 展开的详情面板 */}
                        {expandedId === problem.id && (
                          <div className="px-6 pb-6 pt-2 bg-slate-950/50">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-2">
                              <div className="space-y-2">
                                <p className="text-xs text-slate-400 font-mono uppercase border-b border-slate-800 pb-1">Description / 题意</p>
                                <p className="text-sm text-slate-300 leading-relaxed min-h-[3rem]">
                                  {problem.description || <span className="text-slate-600 italic">No description...</span>}
                                </p>
                              </div>
                              <div className="space-y-2">
                                <p className="text-xs text-slate-400 font-mono uppercase border-b border-slate-800 pb-1">Thoughts / 思路</p>
                                <p className="text-sm text-slate-300 leading-relaxed min-h-[3rem]">
                                  {problem.thoughts || <span className="text-slate-600 italic">No thoughts...</span>}
                                </p>
                              </div>
                            </div>
                            
                            <div className="mt-6 flex flex-wrap items-center justify-between gap-4">
                              <div className="flex items-center gap-2">
                                <Tag size={16} className="text-slate-500" />
                                {problem.tags && problem.tags.length > 0 ? (
                                  problem.tags.map((tag, idx) => (
                                    <span key={idx} className="text-xs px-2 py-1 bg-slate-800 text-cyan-300 rounded border border-slate-700 font-mono">
                                      #{tag}
                                    </span>
                                  ))
                                ) : (
                                  <span className="text-xs text-slate-600 italic">No tags</span>
                                )}
                              </div>
                              
                              {/* 题解跳转按钮 */}
                              {problem.url && (
                                <a 
                                  href={problem.url} 
                                  target="_blank" 
                                  rel="noreferrer"
                                  className="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg text-sm font-bold transition-all shadow-[0_0_10px_rgba(16,185,129,0.3)] hover:shadow-[0_0_20px_rgba(16,185,129,0.6)] hover:-translate-y-0.5"
                                >
                                  <ExternalLink size={16} />
                                  打开 Markdown 题解
                                </a>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                    {filteredProblems.length === 0 && (
                      <div className="p-12 text-center text-slate-500 font-mono text-lg flex flex-col items-center gap-4">
                        <Swords size={48} className="text-slate-700" />
                        NO DATA FOUND // 继续刷题吧！
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* 右侧：录入表单 */}
              <div className="space-y-8">
                <div className="glass-panel rounded-2xl p-6 border-t-4 border-t-cyan-500">
                  <h3 className="text-xl font-black text-white mb-6 flex items-center gap-2">
                    <Plus size={24} className="text-cyan-400" />
                    NEW ACCEPTED
                  </h3>
                  
                  <form onSubmit={handleAddProblem} className="space-y-5">
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2 font-mono">PLATFORM</label>
                      <select 
                        value={newPlatform}
                        onChange={(e) => setNewPlatform(e.target.value)}
                        className="w-full bg-slate-900/80 border border-slate-700 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition-all font-mono"
                      >
                        <option>Codeforces</option>
                        <option>AtCoder</option>
                        <option>LeetCode</option>
                        <option>Luogu</option>
                        <option>NowCoder</option>
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2 font-mono">PROBLEM TITLE</label>
                      <input 
                        type="text"
                        value={newTitle}
                        onChange={(e) => setNewTitle(e.target.value)}
                        placeholder="e.g. A. Watermelon"
                        className="w-full bg-slate-900/80 border border-slate-700 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition-all placeholder:text-slate-600 font-bold"
                      />
                    </div>

                    {/* 新增：MD题解外链 */}
                    <div>
                      <label className="block text-xs font-bold text-emerald-400 mb-2 font-mono flex items-center gap-1">
                        <ExternalLink size={12} /> SOLUTION URL (MD文件/博客链接)
                      </label>
                      <input 
                        type="url"
                        value={newUrl}
                        onChange={(e) => setNewUrl(e.target.value)}
                        placeholder="https://github.com/.../solution.md"
                        className="w-full bg-emerald-950/20 border border-emerald-900/50 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all placeholder:text-slate-600 text-sm"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2 font-mono">DESCRIPTION</label>
                      <textarea 
                        value={newDescription}
                        onChange={(e) => setNewDescription(e.target.value)}
                        placeholder="简述题意..."
                        rows="2"
                        className="w-full bg-slate-900/80 border border-slate-700 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition-all placeholder:text-slate-600 resize-none text-sm"
                      ></textarea>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2 font-mono">THOUGHTS</label>
                      <textarea 
                        value={newThoughts}
                        onChange={(e) => setNewThoughts(e.target.value)}
                        placeholder="核心算法与思路..."
                        rows="3"
                        className="w-full bg-slate-900/80 border border-slate-700 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition-all placeholder:text-slate-600 resize-none text-sm"
                      ></textarea>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2 font-mono">TAGS</label>
                      <input 
                        type="text"
                        value={newTags}
                        onChange={(e) => setNewTags(e.target.value)}
                        placeholder="dp, math, graphs..."
                        className="w-full bg-slate-900/80 border border-slate-700 text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 transition-all placeholder:text-slate-600 font-mono text-sm"
                      />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-2 font-mono">DIFFICULTY</label>
                      <div className="grid grid-cols-3 gap-3">
                        {['Easy', 'Medium', 'Hard'].map(diff => (
                          <button
                            key={diff}
                            type="button"
                            onClick={() => setNewDifficulty(diff)}
                            className={`py-2 text-sm rounded-xl border-2 font-bold transition-all ${
                              newDifficulty === diff 
                                ? (diff === 'Easy' ? 'bg-green-500/20 border-green-500 text-green-400 shadow-[0_0_10px_rgba(34,197,94,0.3)]' :
                                   diff === 'Medium' ? 'bg-orange-500/20 border-orange-500 text-orange-400 shadow-[0_0_10px_rgba(249,115,22,0.3)]' :
                                   'bg-red-500/20 border-red-500 text-red-400 shadow-[0_0_10px_rgba(239,68,68,0.3)]')
                                : 'bg-slate-900/80 border-slate-700 text-slate-500 hover:border-slate-500'
                            }`}
                          >
                            {diff}
                          </button>
                        ))}
                      </div>
                    </div>

                    <button 
                      type="submit"
                      disabled={!newTitle.trim()}
                      className="w-full bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white font-black rounded-xl py-4 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(6,182,212,0.4)]"
                    >
                      <CheckCircle2 size={20} />
                      COMMIT // 提交 AC
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
